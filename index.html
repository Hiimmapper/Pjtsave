<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive OS | Mobile Core</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* True Black Dark Mode & K-Color */
        :root {
            --bg-base: #000000;
            --bg-panel: #111111;
            --bg-hover: #1e1e1e;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #27272a;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --k-up: #ef4444;       
            --k-down: #3b82f6;     
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-base); color: var(--text-main); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* 1. Real-time Ticker Tape */
        .ticker-wrapper { border-bottom: 1px solid var(--border-color); background: var(--bg-base); height: 46px; }

        /* Main Container */
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }

        /* 2. Header & AI Briefing */
        header { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; gap: 1rem; }
        .header-left h1 { font-size: 1.6rem; font-weight: 800; }
        .header-left p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem; font-weight: 500; }
        .header-right { text-align: right; }
        .time { font-size: 2rem; font-weight: 800; line-height: 1; letter-spacing: -0.02em; }
        .date { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.4rem; font-weight: 600; }

        .ai-banner { background: linear-gradient(to right, rgba(139, 92, 246, 0.1), rgba(59, 130, 246, 0.05)); border: 1px solid rgba(139, 92, 246, 0.2); border-left: 4px solid var(--accent-purple); padding: 1rem 1.5rem; border-radius: 8px; display: flex; align-items: flex-start; gap: 1rem; }
        .ai-icon { color: var(--accent-purple); font-size: 1.5rem; margin-top: 2px; }
        .ai-text { font-weight: 600; font-size: 0.95rem; line-height: 1.5; color: var(--text-main); }

        /* 3. Responsive Grid */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; align-items: start; }
        
        .panel { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; background: #0a0a0a; display: flex; align-items: center; gap: 0.5rem;}
        .panel-header i { color: var(--accent-blue); }

        /* Weather Panel */
        .weather-current { padding: 1.5rem; text-align: center; border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .w-icon { font-size: 3.5rem; margin-bottom: 0.5rem; }
        .w-temp { font-size: 2.5rem; font-weight: 800; line-height: 1; margin-bottom: 0.5rem; }
        .w-desc { color: var(--text-muted); font-size: 0.9rem; font-weight: 600; }
        .w-location { margin-top: 1rem; font-size: 0.85rem; color: var(--accent-blue); font-weight: 700; display:flex; align-items:center; gap:0.5rem; }

        .weather-hourly { display: flex; overflow-x: auto; padding: 1.2rem; gap: 1.2rem; scrollbar-width: none; }
        .weather-hourly::-webkit-scrollbar { display: none; }
        .h-item { display: flex; flex-direction: column; align-items: center; gap: 0.6rem; min-width: 45px; }
        .h-time { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }
        .h-icon { font-size: 1.2rem; }
        .h-temp { font-size: 0.9rem; font-weight: 700; }

        /* Market & ISDRAM Panel */
        .isdram-row { padding: 1.25rem; display: flex; justify-content: space-between; align-items: center; background: rgba(139, 92, 246, 0.05); border-bottom: 1px solid var(--border-color); }
        .isdram-label { font-size: 0.85rem; font-weight: 700; color: var(--accent-purple); display:flex; align-items:center; gap:0.5rem;}
        .isdram-val { font-size: 1.2rem; font-weight: 800; display:flex; align-items:center; gap:0.5rem;}

        .chart-wrapper { height: 320px; padding: 0; }

        /* News Panel */
        .news-item { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border-color); display: flex; gap: 0.8rem; align-items: flex-start; text-decoration: none; color: inherit; transition: background 0.2s; }
        .news-item:hover { background: var(--bg-hover); }
        .news-icon { color: var(--text-muted); font-size: 1.1rem; margin-top: 2px; }
        .news-title { font-weight: 600; font-size: 0.9rem; line-height: 1.4; margin-bottom: 0.4rem; }
        .news-meta { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .header-right { text-align: left; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="ticker-wrapper">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
            "symbols": [
                { "proName": "TVC:KOSPI", "title": "코스피" },
                { "proName": "TVC:KOSDAQ", "title": "코스닥" },
                { "proName": "AMEX:SPY", "title": "S&P 500" },
                { "proName": "NASDAQ:QQQ", "title": "나스닥 100" },
                { "proName": "FX_IDC:USDKRW", "title": "원/달러" },
                { "proName": "FX_IDC:JPYKRW", "title": "원/엔" }
            ],
            "showSymbolLogo": true,
            "isTransparent": true,
            "displayMode": "adaptive",
            "colorTheme": "dark",
            "locale": "kr"
            }
            </script>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="header-left">
                <h1>Command Center</h1>
                <p>데이터 기반 의사결정을 위한 모바일 인텔리전스</p>
            </div>
            <div class="header-right">
                <div class="time" id="time">--:--</div>
                <div class="date" id="date">로딩 중...</div>
            </div>
        </header>

        <div class="ai-banner">
            <div class="ai-icon"><i class="fa-solid fa-sparkles"></i></div>
            <div class="ai-text" id="ai-insight">AI가 현재 접속하신 위치의 기상과 글로벌 시장 데이터를 동기화하여 분석하고 있습니다...</div>
        </div>

        <div class="dashboard-grid">
            
            <div class="panel">
                <div class="panel-header"><i class="fa-solid fa-location-dot"></i> Local Environment</div>
                <div class="weather-current">
                    <div class="w-icon" id="w-icon-now">⏳</div>
                    <div class="w-temp" id="w-temp-now">--°</div>
                    <div class="w-desc" id="w-desc-main">기상 정보 로딩 중</div>
                    <div class="w-location" id="w-location"><i class="fa-solid fa-crosshairs"></i> 위치 확인 중</div>
                </div>
                <div class="weather-hourly" id="hourly-container">
                    <div class="h-item"><div class="h-time">로딩중</div><div class="h-icon">⏳</div><div class="h-temp">--°</div></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header"><i class="fa-solid fa-chart-pie"></i> Market Summary</div>
                <div class="isdram-row">
                    <div class="isdram-label"><i class="fa-solid fa-microchip"></i> ISDRAM INDEX</div>
                    <div class="isdram-val">1,425.80 <span style="color:var(--k-up); font-size:0.85rem;">(+2.45%)</span></div>
                </div>
                <div class="chart-wrapper">
                    <div class="tradingview-widget-container" style="height:100%; width:100%;">
                        <div class="tradingview-widget-container__widget" style="height:100%; width:100%;"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                        {
                            "colorTheme": "dark",
                            "dateRange": "1D",
                            "showChart": true,
                            "locale": "kr",
                            "width": "100%",
                            "height": "100%",
                            "isTransparent": true,
                            "showSymbolLogo": true,
                            "showFloatingTooltip": true,
                            "tabs": [
                            {
                                "title": "주요 지수",
                                "symbols": [
                                    { "s": "TVC:KOSPI", "d": "코스피" },
                                    { "s": "TVC:KOSDAQ", "d": "코스닥" },
                                    { "s": "NASDAQ:QQQ", "d": "나스닥 100" },
                                    { "s": "AMEX:SPY", "d": "S&P 500" }
                                ]
                            },
                            {
                                "title": "환율",
                                "symbols": [
                                    { "s": "FX_IDC:USDKRW", "d": "원/달러" },
                                    { "s": "FX_IDC:JPYKRW", "d": "원/엔" },
                                    { "s": "FX_IDC:CNYKRW", "d": "원/위안" }
                                ]
                            }
                            ]
                        }
                        </script>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header"><i class="fa-regular fa-newspaper"></i> Live Feed</div>
                <div id="news-container">
                    <div class="news-item"><div class="news-title">뉴스를 불러오는 중입니다...</div></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 1. Time Update
        function updateTime() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('date').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
            let hours = now.getHours();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            document.getElementById('time').innerText = `${String(hours).padStart(2,'0')}:${String(now.getMinutes()).padStart(2, '0')} ${ampm}`;
        }
        setInterval(updateTime, 1000); updateTime();

        // 2. Weather & AI Context
        function getWeatherDetails(code) {
            if (code >= 0 && code <= 1) return { icon: '☀️', desc: '맑음' };
            if (code >= 2 && code <= 3) return { icon: '⛅', desc: '구름 조금' };
            if (code >= 45 && code <= 48) return { icon: '🌫️', desc: '안개' };
            if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return { icon: '🌧️', desc: '비' };
            if (code >= 71 && code <= 86) return { icon: '❄️', desc: '눈' };
            if (code >= 95) return { icon: '⛈️', desc: '천둥번개' };
            return { icon: '☁️', desc: '흐림' };
        }

        async function fetchWeather(lat, lon, locName) {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&hourly=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul`;
                const res = await fetch(url);
                const data = await res.json();
                
                const currentTemp = Math.round(data.current.temperature_2m);
                const maxTemp = Math.round(data.daily.temperature_2m_max[0]);
                const minTemp = Math.round(data.daily.temperature_2m_min[0]);
                const currentInfo = getWeatherDetails(data.current.weather_code);

                document.getElementById('w-location').innerHTML = `<i class="fa-solid fa-location-crosshairs"></i> ${locName}`;
                document.getElementById('w-icon-now').innerText = currentInfo.icon;
                document.getElementById('w-temp-now').innerText = `${currentTemp}°`;
                document.getElementById('w-desc-main').innerText = `${currentInfo.desc} · 최고 ${maxTemp}° / 최저 ${minTemp}°`;

                const currentHourStr = data.current.time.substring(0, 13);
                const hourlyTimes = data.hourly.time;
                let startIndex = hourlyTimes.findIndex(t => t.startsWith(currentHourStr));
                if(startIndex === -1) startIndex = 0;

                let hourlyHtml = '';
                for(let i = startIndex + 1; i <= startIndex + 6; i++) {
                    if(!hourlyTimes[i]) break;
                    const hObj = new Date(hourlyTimes[i]);
                    let h = hObj.getHours();
                    const ampm = h >= 12 ? 'PM' : 'AM';
                    h = h % 12 || 12;
                    const hTemp = Math.round(data.hourly.temperature_2m[i]);
                    const hInfo = getWeatherDetails(data.hourly.weather_code[i]);

                    hourlyHtml += `
                    <div class="h-item">
                        <div class="h-time">${h} ${ampm}</div>
                        <div class="h-icon">${hInfo.icon}</div>
                        <div class="h-temp">${hTemp}°</div>
                    </div>`;
                }
                document.getElementById('hourly-container').innerHTML = hourlyHtml;

                // AI Insight
                const aiEl = document.getElementById('ai-insight');
                const isRaining = data.current.weather_code >= 51 && data.current.weather_code <= 95;
                if(isRaining) {
                    aiEl.innerHTML = `현재 <span style="color:var(--accent-blue);">비가 내리고 있습니다.</span> 외부 활동을 줄이고 주요 시장 지표와 글로벌 증시 변동성에 집중하기 좋은 날씨입니다.`;
                } else {
                    aiEl.innerHTML = `오늘 기상은 <span style="color:var(--accent-purple);">활동하기 좋은 맑은 상태</span>입니다. 쾌적한 날씨와 함께 성공적인 시장 분석과 하루를 계획해 보십시오.`;
                }

            } catch (error) {
                document.getElementById('w-desc-main').innerText = "날씨 정보 오류";
            }
        }

        async function getCityName(lat, lon) {
            try {
                const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ko`);
                const data = await res.json();
                return data.locality || data.city || "현재 위치";
            } catch(e) { return "현재 위치"; }
        }

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (p) => { const loc = await getCityName(p.coords.latitude, p.coords.longitude); fetchWeather(p.coords.latitude, p.coords.longitude, loc); },
                () => fetchWeather(35.1796, 129.0756, "부산 (기본값)")
            );
        } else { fetchWeather(35.1796, 129.0756, "부산 (기본값)"); }

        // 3. News Feed
        async function fetchNews() {
            try {
                const rssUrl = 'https://www.mk.co.kr/rss/30000001/';
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
                const res = await fetch(apiUrl);
                const data = await res.json();
                
                if(data.status === 'ok') {
                    let html = '';
                    data.items.slice(0, 6).forEach(item => {
                        const d = new Date(item.pubDate);
                        const timeStr = `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
                        html += `
                        <a href="${item.link}" target="_blank" class="news-item">
                            <div class="news-icon"><i class="fa-regular fa-newspaper"></i></div>
                            <div style="flex:1;">
                                <div class="news-title">${item.title}</div>
                                <div class="news-meta">매일경제 · ${timeStr}</div>
                            </div>
                        </a>`;
                    });
                    document.getElementById('news-container').innerHTML = html;
                }
            } catch (error) {
                document.getElementById('news-container').innerHTML = '<div class="news-item">뉴스 로드 실패</div>';
            }
        }
        fetchNews();
    </script>
</body>
</html>

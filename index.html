<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 개인 대시보드</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.85); /* 배경이 보이도록 살짝 투명하게 */
            --text-main: #111827;
            --text-muted: #4b5563;
            --accent: #3b82f6;
            --border-radius: 20px;
        }
        
        /* 날씨에 따른 동적 배경 CSS (구글 날씨 스타일) */
        body {
            font-family: 'Pretendard', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background 1s ease-in-out; /* 배경 변경 시 부드럽게 */
            background-color: #e0f2fe; /* 기본 배경 */
        }
        
        body.bg-clear { background: linear-gradient(to bottom, #7dd3fc, #bae6fd); } /* 맑음 */
        body.bg-clouds { background: linear-gradient(to bottom, #94a3b8, #cbd5e1); } /* 흐림 */
        body.bg-rain { background: linear-gradient(to bottom, #475569, #94a3b8); color: #fff; } /* 비 */
        body.bg-snow { background: linear-gradient(to bottom, #e2e8f0, #f8fafc); } /* 눈 */

        .container {
            max-width: 1200px;
            width: 100%;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 0 10px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }
        
        /* 비 올 때 헤더 글씨색 보호 */
        body.bg-rain header { color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        
        .time-display { text-align: right; }
        .time-display #date { font-size: 15px; font-weight: 600; }
        .time-display #time { font-size: 28px; font-weight: 800; letter-spacing: 1px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            color: #111827; /* 카드는 항상 어두운 글씨 유지 */
        }
        .card:hover { transform: translateY(-2px); }
        
        .card-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header i { color: var(--accent); }
        
        /* 날씨 섹션 */
        .weather-info { text-align: center; padding: 10px 0; }
        .weather-icon { font-size: 60px; margin-bottom: 10px; }
        .temp { font-size: 36px; font-weight: 800; }
        .weather-desc { color: var(--text-muted); font-size: 16px; font-weight: 600; }
        
        /* 뉴스 섹션 */
        .news-item {
            display: block;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
            color: #1f2937;
            text-decoration: none;
            font-size: 15px;
            line-height: 1.5;
            transition: color 0.2s;
        }
        .news-item:last-child { border-bottom: none; }
        .news-item:hover { color: var(--accent); font-weight: 600; }
        
        /* 할일 섹션 */
        .list-item {
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
            font-size: 15px;
            display: flex;
            gap: 10px;
        }
        .list-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="bg-clear">
    <div class="container">
        <header>
            <h1>오늘의 대시보드 🚀</h1>
            <div class="time-display">
                <div id="date">로딩 중...</div>
                <div id="time">--:--:--</div>
            </div>
        </header>

        <div class="grid">
            <div class="card" style="padding: 0; overflow: hidden;">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                    {
                        "colorTheme": "light",
                        "dateRange": "1D",
                        "showChart": false,
                        "locale": "kr",
                        "width": "100%",
                        "height": "320",
                        "largeChartUrl": "",
                        "isTransparent": true,
                        "showSymbolLogo": true,
                        "showFloatingTooltip": true,
                        "tabs": [
                        {
                            "title": "주가지수",
                            "symbols": [
                                { "s": "KRX:KOSPI", "d": "코스피" },
                                { "s": "KRX:KOSDAQ", "d": "코스닥" },
                                { "s": "DJ:DJI", "d": "다우존스" },
                                { "s": "SP:SPX", "d": "S&P 500" },
                                { "s": "NASDAQ:NDX", "d": "나스닥 100" }
                            ],
                            "originalTitle": "Indices"
                        }
                        ]
                    }
                    </script>
                </div>
                </div>

            <div class="card" style="padding: 0; overflow: hidden;">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                    {
                        "colorTheme": "light",
                        "dateRange": "1D",
                        "showChart": false,
                        "locale": "kr",
                        "width": "100%",
                        "height": "320",
                        "largeChartUrl": "",
                        "isTransparent": true,
                        "showSymbolLogo": true,
                        "showFloatingTooltip": true,
                        "tabs": [
                        {
                            "title": "환율 및 ISDRAM",
                            "symbols": [
                                { "s": "FX_IDC:USDKRW", "d": "원/달러" },
                                { "s": "FX_IDC:JPYKRW", "d": "원/엔 (100엔)" },
                                { "s": "FX_IDC:CNYKRW", "d": "원/위안" },
                                { "s": "SGX:ISDRAM", "d": "ISDRAM 지수" }
                            ],
                            "originalTitle": "Forex"
                        }
                        ]
                    }
                    </script>
                </div>
                </div>

            <div class="card">
                <div class="card-header"><i class="fa-solid fa-cloud-sun"></i> 실시간 날씨</div>
                <div class="weather-info" id="weather-container">
                    <div class="weather-icon" id="w-icon">⏳</div>
                    <div class="temp" id="w-temp">로딩중...</div>
                    <div class="weather-desc" id="w-desc">날씨 정보를 불러오는 중입니다</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><i class="fa-regular fa-newspaper"></i> 실시간 주요 뉴스</div>
                <div id="news-data">
                    <div class="list-item">뉴스를 불러오는 중입니다...</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><i class="fa-regular fa-calendar-check"></i> 오늘의 할 일</div>
                <div id="todo-data">
                    <div class="list-item"><i class="fa-solid fa-check" style="color:var(--accent); margin-top:3px; margin-right:8px;"></i> 오전 10:00 - 주간 업무 보고 회의 참석</div>
                    <div class="list-item"><i class="fa-solid fa-check" style="color:var(--accent); margin-top:3px; margin-right:8px;"></i> 오후 02:00 - 신규 프로젝트 킥오프 미팅</div>
                    <div class="list-item"><i class="fa-solid fa-check" style="color:var(--accent); margin-top:3px; margin-right:8px;"></i> 오후 06:30 - 헬스장 (하체 운동)</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 실시간 시계 업데이트
        function updateTime() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('date').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
            
            let hours = now.getHours();
            const ampm = hours >= 12 ? '오후' : '오전';
            hours = hours % 12 || 12;
            document.getElementById('time').innerText = `${ampm} ${hours}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. Open-Meteo 실시간 날씨 API 연동 (부산 좌표: 위도 35.1796, 경도 129.0756)
        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.1796&longitude=129.0756&current=temperature_2m,weather_code&timezone=Asia%2FSeoul');
                const data = await res.json();
                const temp = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;
                
                let icon = '☁️';
                let desc = '흐림';
                let bgClass = 'bg-clouds';

                // WMO 날씨 코드 해석 및 배경 변경
                if (code === 0 || code === 1) { icon = '☀️'; desc = '맑음'; bgClass = 'bg-clear'; }
                else if (code === 2 || code === 3) { icon = '⛅'; desc = '구름 조금/많음'; bgClass = 'bg-clouds'; }
                else if (code >= 45 && code <= 48) { icon = '🌫️'; desc = '안개'; bgClass = 'bg-clouds'; }
                else if (code >= 51 && code <= 67 || code >= 80 && code <= 82) { icon = '🌧️'; desc = '비'; bgClass = 'bg-rain'; }
                else if (code >= 71 && code <= 77 || code >= 85 && code <= 86) { icon = '❄️'; desc = '눈'; bgClass = 'bg-snow'; }
                else if (code >= 95) { icon = '⛈️'; desc = '천둥번개'; bgClass = 'bg-rain'; }

                document.getElementById('w-temp').innerText = `${temp}°C`;
                document.getElementById('w-icon').innerText = icon;
                document.getElementById('w-desc').innerText = `부산 현재 날씨: ${desc}`;
                
                // body 태그의 클래스를 변경하여 배경화면 애니메이션 적용
                document.body.className = bgClass;

            } catch (error) {
                document.getElementById('w-desc').innerText = '날씨 정보를 불러오지 못했습니다.';
            }
        }
        fetchWeather();
        setInterval(fetchWeather, 600000); // 10분마다 날씨 갱신

        // 3. 구글 뉴스 RSS 실시간 연동 (rss2json API 활용)
        async function fetchNews() {
            try {
                // 구글 한국 뉴스 피드
                const rssUrl = 'https://news.google.com/rss?hl=ko&gl=KR&ceid=KR:ko';
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`);
                const data = await res.json();
                
                if (data.status === 'ok') {
                    const articles = data.items.slice(0, 4); // 상위 4개 기사만 추출
                    const newsHtml = articles.map(article => `
                        <a href="${article.link}" target="_blank" class="news-item">
                            📰 ${article.title}
                        </a>
                    `).join('');
                    document.getElementById('news-data').innerHTML = newsHtml;
                }
            } catch (error) {
                document.getElementById('news-data').innerHTML = '<div class="list-item">뉴스를 불러오지 못했습니다.</div>';
            }
        }
        fetchNews();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Ambient Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            color: #EAEAEA;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow: hidden;
            background-color: #050505;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
        }

        /* 배경 가독성용 다크 오버레이 */
        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
        }

        /* 1. 상단: 시계 & GPS 기반 날씨 */
        .header-container {
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15); padding-bottom: 20px;
        }
        .time-box h1 { font-size: 5rem; font-weight: 800; letter-spacing: -2px; line-height: 1; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .time-box p { font-size: 1.1rem; color: #ccc; margin-top: 10px; font-weight: 500; }
        
        .weather-box { text-align: right; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .weather-box .location { font-size: 1.1rem; color: #00e676; font-weight: 600; margin-bottom: 5px; display: flex; justify-content: flex-end; align-items: center; gap: 5px; }
        .weather-box .temp { font-size: 3.5rem; font-weight: 300; color: #fff; line-height: 1; }
        .weather-box .desc { font-size: 1rem; color: #ddd; margin-top: 5px; font-weight: 500; }

        /* 중단 1: 하루 확장 시간대별 날씨 */
        .hourly-container { margin: 25px 0 15px 0; }
        .section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; margin-bottom: 12px; font-weight: 700; }
        .hourly-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
        .hourly-scroll::-webkit-scrollbar { display: none; }
        .hourly-card {
            min-width: 85px; background: rgba(20, 20, 20, 0.6); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px); border-radius: 16px; padding: 18px 10px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .hourly-card .h-time { font-size: 0.9rem; color: #ccc; margin-bottom: 8px; font-weight: 500; }
        .hourly-card .h-icon { font-size: 2rem; margin: 5px 0; }
        .hourly-card .h-temp { font-size: 1.2rem; font-weight: 700; color: #fff; margin-top: 8px; }

        /* 중단 2: 실시간 증권/환율 정보 (커스텀 UI) */
        .finance-container { margin-bottom: 25px; }
        .finance-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .finance-card {
            background: rgba(10, 10, 10, 0.7); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); border-radius: 12px; padding: 15px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .f-title { font-size: 0.85rem; color: #aaa; font-weight: 600; margin-bottom: 8px; }
        .f-price { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 4px; letter-spacing: -0.5px; }
        .f-change { font-size: 0.95rem; font-weight: 600; }
        .up { color: #ff4d4d; } /* 한국식 상승 빨강 */
        .down { color: #4d79ff; } /* 한국식 하락 파랑 */
        .flat { color: #aaaaaa; }

        /* 하단: 긴급 뉴스 & 경제 (로이터, 한국경제) */
        .news-container { border-top: 1px solid rgba(255, 255, 255, 0.15); padding-top: 20px; flex-grow: 1; }
        .news-wrapper { position: relative; height: 100%; overflow: hidden; min-height: 60px; }
        .news-item {
            font-size: 1.4rem; line-height: 1.5; font-weight: 600; color: #fff; word-break: keep-all; text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            position: absolute; width: 100%; opacity: 0; transform: translateY(15px); transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .news-item.active { opacity: 1; transform: translateY(0); }
        .news-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.9rem; font-weight: 700; margin-right: 10px; vertical-align: middle; }
        .tag-reuters { background-color: #ff9800; color: #000; }
        .tag-econ { background-color: #00bcd4; color: #000; }

    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="header-container">
        <div class="time-box">
            <h1 id="txt-time">00:00</h1>
            <p id="txt-date">시간 연동 중...</p>
        </div>
        <div class="weather-box">
            <div class="location" id="cur-location">📍 위치 탐색 중...</div>
            <div class="temp" id="cur-temp">--°</div>
            <div class="desc" id="cur-desc">날씨 연동 중...</div>
        </div>
    </div>

    <div class="hourly-container">
        <div class="section-title">Today's Weather Flow</div>
        <div class="hourly-scroll" id="hourly-wrapper">
            <div class="hourly-card" style="width:100%;"><span class="h-time">GPS 동의 및 데이터를 기다리는 중입니다...</span></div>
        </div>
    </div>

    <div class="finance-container">
        <div class="section-title">Market Indicators</div>
        <div class="finance-grid" id="finance-wrapper">
            <div class="finance-card"><span class="f-title">KOSPI</span><span class="f-price">로딩중...</span></div>
            <div class="finance-card"><span class="f-title">KOSDAQ</span><span class="f-price">로딩중...</span></div>
            <div class="finance-card"><span class="f-title">NASDAQ</span><span class="f-price">로딩중...</span></div>
            <div class="finance-card"><span class="f-title">USD/KRW 환율</span><span class="f-price">로딩중...</span></div>
        </div>
    </div>

    <div class="news-container">
        <div class="section-title">Live Updates : Reuters & Economy</div>
        <div class="news-wrapper" id="news-wrapper">
            <div class="news-item active">실시간 주요 뉴스를 불러오는 중입니다...</div>
        </div>
    </div>

    <script>
        // 공통 유틸: 숫자 콤마 포맷
        const formatNum = (num) => parseFloat(num).toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // 1. 실시간 시계
        function initClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('txt-time').innerText = now.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
                document.getElementById('txt-date').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            }, 1000);
        }

        // 2. GPS 기반 지역명 + 날씨 호출 (BigDataCloud + Open-Meteo)
        function initWeather() {
            navigator.geolocation.getCurrentPosition(
                pos => fetchWeatherData(pos.coords.latitude, pos.coords.longitude),
                err => { 
                    console.warn("GPS 권한 없음. 서울 강남구 기준 로드."); 
                    document.getElementById('cur-location').innerText = "📍 서울특별시 강남구 (기본값)";
                    fetchWeatherData(37.4979, 127.0276); 
                },
                { enableHighAccuracy: false, maximumAge: 600000, timeout: 10000 }
            );
        }

        async function fetchWeatherData(lat, lon) {
            try {
                // 내 위치 동/구 이름 가져오기 (무료 Reverse Geocoding)
                try {
                    const geoRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ko`);
                    const geoData = await geoRes.json();
                    if(geoData.city || geoData.locality) {
                        document.getElementById('cur-location').innerText = `📍 ${geoData.city || ''} ${geoData.locality || ''}`.trim();
                    }
                } catch(e) { console.log("지역명 변환 실패"); }

                // 날씨 데이터 가져오기
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,weathercode&timezone=auto`;
                const res = await fetch(url);
                const data = await res.json();
                
                const cur = data.current_weather;
                document.getElementById('cur-temp').innerText = `${Math.round(cur.temperature)}°`;
                
                let icon = "☀️", desc = "맑음", bgUrl = "https://images.unsplash.com/photo-1601297183305-6df142704ea2?q=80&w=1920&auto=format&fit=crop";
                const code = cur.weathercode;
                
                if (code > 0 && code <= 3) { icon = "⛅"; desc = "구름조금"; }
                else if (code >= 45 && code <= 48) { icon = "🌫️"; desc = "안개"; bgUrl = "https://images.unsplash.com/photo-1485236715568-ddc5ee6ca227?q=80&w=1920&auto=format&fit=crop"; }
                else if (code >= 51 && code <= 69) { icon = "🌧️"; desc = "비"; bgUrl = "https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?q=80&w=1920&auto=format&fit=crop"; }
                else if (code >= 71 && code <= 79) { icon = "❄️"; desc = "눈"; bgUrl = "https://images.unsplash.com/photo-1491002052546-bf38f186af56?q=80&w=1920&auto=format&fit=crop"; }
                else if (code >= 80) { icon = "⛈️"; desc = "흐림/천둥"; bgUrl = "https://images.unsplash.com/photo-1534088568595-a066f410cbda?q=80&w=1920&auto=format&fit=crop"; }

                document.getElementById('cur-desc').innerText = desc;
                document.body.style.backgroundImage = `url('${bgUrl}')`;

                // 오늘 하루 12시간 분량 날씨 렌더링
                const hourlyWrapper = document.getElementById('hourly-wrapper');
                hourlyWrapper.innerHTML = '';
                const nowHour = new Date().getHours();
                let startIndex = data.hourly.time.findIndex(t => new Date(t).getHours() === nowHour && new Date(t) >= new Date().setHours(0,0,0,0));
                if(startIndex === -1) startIndex = 0;

                for (let i = startIndex; i < startIndex + 12; i++) {
                    if (!data.hourly.time[i]) break;
                    const tDate = new Date(data.hourly.time[i]);
                    const ampm = tDate.getHours() >= 12 ? '오후' : '오전';
                    const hr = tDate.getHours() % 12 || 12;
                    const hTemp = Math.round(data.hourly.temperature_2m[i]);
                    const hCode = data.hourly.weathercode[i];
                    
                    let hIcon = "☀️";
                    if (hCode > 0 && hCode <= 3) hIcon = "⛅";
                    else if (hCode >= 45 && hCode <= 48) hIcon = "🌫️";
                    else if (hCode >= 51 && hCode <= 69) hIcon = "🌧️";
                    else if (hCode >= 71 && hCode <= 79) hIcon = "❄️";
                    else if (hCode >= 80) hIcon = "⛈️";

                    hourlyWrapper.innerHTML += `
                        <div class="hourly-card">
                            <span class="h-time">${ampm} ${hr}시</span>
                            <span class="h-icon">${hIcon}</span>
                            <span class="h-temp">${hTemp}°</span>
                        </div>
                    `;
                }
            } catch (err) { console.error("날씨 로드 에러", err); }
        }

        // 3. 증권 및 환율 (안정적인 CodeTabs 프록시 및 무료 환율 API 직접 호출)
        async function initFinance() {
            try {
                const wrapper = document.getElementById('finance-wrapper');
                
                // 1) 주식 지수 (Yahoo Finance API 우회)
                let stocks = [];
                try {
                    const stockRes = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent('https://query1.finance.yahoo.com/v7/finance/quote?symbols=^KS11,^KQ11,^IXIC')}`);
                    const stockData = await stockRes.json();
                    stocks = stockData.quoteResponse.result;
                } catch(e) { console.log("주식 데이터 지연"); }

                // 2) 환율 (CORS 없는 무료 직접 API)
                let krwRate = 0;
                try {
                    const exRes = await fetch('https://latest.currency-api.pages.dev/v1/currencies/usd.json');
                    const exData = await exRes.json();
                    krwRate = exData.usd.krw;
                } catch(e) { console.log("환율 데이터 지연"); }

                // HTML 생성
                let html = '';
                
                // 주식 렌더링
                stocks.forEach(item => {
                    let name = item.symbol === '^KS11' ? 'KOSPI' : (item.symbol === '^KQ11' ? 'KOSDAQ' : 'NASDAQ');
                    const price = item.regularMarketPrice ? formatNum(item.regularMarketPrice) : '0.00';
                    const change = item.regularMarketChange || 0;
                    const percent = item.regularMarketChangePercent || 0;
                    
                    const colorCls = change > 0 ? 'up' : (change < 0 ? 'down' : 'flat');
                    const sign = change > 0 ? '▲' : (change < 0 ? '▼' : '-');

                    html += `
                        <div class="finance-card">
                            <span class="f-title">${name}</span>
                            <span class="f-price">${price}</span>
                            <span class="f-change ${colorCls}">${sign} ${formatNum(Math.abs(change))} (${percent.toFixed(2)}%)</span>
                        </div>
                    `;
                });

                // 환율 렌더링
                if(krwRate > 0) {
                    html += `
                        <div class="finance-card">
                            <span class="f-title">USD/KRW 환율</span>
                            <span class="f-price">${formatNum(krwRate)} ₩</span>
                            <span class="f-change flat">실시간 기준환율</span>
                        </div>
                    `;
                }
                
                if(html !== '') wrapper.innerHTML = html;

            } catch (err) { console.error("금융 데이터 로드 실패", err); }
        }

        // 4. 로이터 & 한국 경제 뉴스 믹스 렌더링 (가장 안정적인 rss2json 활용)
        async function initNews() {
            try {
                const reutersUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://news.google.com/rss/search?q=로이터&hl=ko&gl=KR&ceid=KR:ko')}`;
                const econUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://news.google.com/rss/search?q=경제&hl=ko&gl=KR&ceid=KR:ko')}`;

                const [res1, res2] = await Promise.all([ fetch(reutersUrl), fetch(econUrl) ]);
                const data1 = await res1.json();
                const data2 = await res2.json();

                let combinedNews = [];
                
                // 로이터 파싱
                if(data1.items) {
                    data1.items.slice(0, 7).forEach(item => {
                        combinedNews.push(`<span class="news-tag tag-reuters">로이터 통신</span> ${item.title.split(' - ')[0]}`);
                    });
                }
                // 한국경제 파싱
                if(data2.items) {
                    data2.items.slice(0, 7).forEach(item => {
                        combinedNews.push(`<span class="news-tag tag-econ">한국 경제</span> ${item.title.split(' - ')[0]}`);
                    });
                }

                // 무작위 섞기 (교차 노출)
                combinedNews.sort(() => Math.random() - 0.5);

                if (combinedNews.length > 0) {
                    const wrapper = document.getElementById('news-wrapper');
                    wrapper.innerHTML = '';
                    combinedNews.forEach((newsHtml, i) => {
                        wrapper.innerHTML += `<div class="news-item ${i === 0 ? 'active' : ''}">${newsHtml}</div>`;
                    });
                    startNewsRolling();
                }
            } catch (err) { console.error("뉴스 로드 실패", err); }
        }

        let newsInterval;
        function startNewsRolling() {
            clearInterval(newsInterval);
            let idx = 0;
            newsInterval = setInterval(() => {
                const items = document.querySelectorAll('.news-item');
                if (items.length < 2) return;
                items[idx].classList.remove('active');
                idx = (idx + 1) % items.length;
                items[idx].classList.add('active');
            }, 6000);
        }

        // 화면 번인 및 꺼짐 방지 유틸
        function initAntiBurnIn() {
            setInterval(() => {
                const x = Math.floor(Math.random() * 5) - 2;
                const y = Math.floor(Math.random() * 5) - 2;
                document.body.style.transform = `translate(${x}px, ${y}px)`;
            }, 300000);
        }

        async function wakeLock() { try { await navigator.wakeLock.request('screen'); } catch (e) {} }

        // 전체 실행
        window.onload = () => {
            initClock(); initWeather(); initFinance(); initNews(); initAntiBurnIn();
            document.body.addEventListener('click', wakeLock); wakeLock();
            
            // 주기적 업데이트
            setInterval(initWeather, 1800000); // 날씨 30분
            setInterval(initNews, 1800000);    // 뉴스 30분
            setInterval(initFinance, 60000);   // 증권 1분
        };
    </script>
</body>
</html>

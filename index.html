<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 금융 대시보드</title>
    <style>
        :root {
            --bg-main: #1a1a2e;
            --bg-card: #16213e;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --color-up: #ff3333;
            --color-down: #3377ff;
            --color-error: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 20px;
            border-bottom: 1px solid #2a2a4a;
            padding-bottom: 10px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .update-time {
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-title {
            font-size: 1rem;
            color: var(--text-sub);
            margin: 0;
            font-weight: 600;
        }

        .price {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
        }

        .change {
            font-size: 1rem;
            font-weight: 600;
        }

        .up { color: var(--color-up); }
        .down { color: var(--color-down); }
        .neutral { color: var(--text-main); }

        .error-text {
            color: var(--color-error);
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 10px;
        }
        
        .loading {
            color: var(--text-sub);
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Market Dashboard</h1>
        <div class="update-time" id="last-updated">마지막 업데이트: --:--:--</div>
    </div>

    <div class="grid-container">
        <div class="card" id="kospi-card">
            <h2 class="card-title">코스피 (KOSPI)</h2>
            <div class="loading">데이터 로딩 중...</div>
        </div>
        <div class="card" id="kosdaq-card">
            <h2 class="card-title">코스닥 (KOSDAQ)</h2>
            <div class="loading">데이터 로딩 중...</div>
        </div>
        <div class="card" id="usd-card">
            <h2 class="card-title">달러/원 (USD/KRW)</h2>
            <div class="loading">데이터 로딩 중...</div>
        </div>
        <div class="card" id="jpy-card">
            <h2 class="card-title">100엔/원 (JPY 100/KRW)</h2>
            <div class="loading">데이터 로딩 중...</div>
        </div>
    </div>

    <script>
        const formatter = new Intl.NumberFormat('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        async function fetchStockData(symbol, elementId, title) {
            try {
                const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`, {
                    mode: 'cors',
                    headers: { 'Cache-Control': 'no-cache' }
                });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                const meta = data.chart.result[0].meta;
                const price = meta.regularMarketPrice;
                const prevClose = meta.previousClose;
                
                const change = price - prevClose;
                const changePercent = (change / prevClose) * 100;
                
                let colorClass = 'neutral';
                let sign = '';
                if (change > 0) {
                    colorClass = 'up';
                    sign = '+';
                } else if (change < 0) {
                    colorClass = 'down';
                }

                document.getElementById(elementId).innerHTML = `
                    <h2 class="card-title">${title}</h2>
                    <div class="price ${colorClass}">${formatter.format(price)}</div>
                    <div class="change ${colorClass}">
                        ${sign}${formatter.format(change)} (${sign}${changePercent.toFixed(2)}%)
                    </div>
                `;
            } catch (error) {
                console.error(`[${title}] Fetch Error:`, error);
                document.getElementById(elementId).innerHTML = `
                    <h2 class="card-title">${title}</h2>
                    <div class="error-text">데이터 로딩 실패 - 재시도 중...</div>
                `;
            }
        }

        async function fetchExchangeRates() {
            try {
                const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                const usdKrw = data.usd.krw;
                const usdJpy = data.usd.jpy;
                const jpy100Krw = (usdKrw / usdJpy) * 100;

                document.getElementById('usd-card').innerHTML = `
                    <h2 class="card-title">달러/원 (USD/KRW)</h2>
                    <div class="price neutral">${formatter.format(usdKrw)}</div>
                `;
                
                document.getElementById('jpy-card').innerHTML = `
                    <h2 class="card-title">100엔/원 (JPY 100/KRW)</h2>
                    <div class="price neutral">${formatter.format(jpy100Krw)}</div>
                `;
            } catch (error) {
                console.error('[환율] Fetch Error:', error);
                document.getElementById('usd-card').innerHTML = `
                    <h2 class="card-title">달러/원 (USD/KRW)</h2>
                    <div class="error-text">데이터 로딩 실패 - 재시도 중...</div>
                `;
                document.getElementById('jpy-card').innerHTML = `
                    <h2 class="card-title">100엔/원 (JPY 100/KRW)</h2>
                    <div class="error-text">데이터 로딩 실패 - 재시도 중...</div>
                `;
            }
        }

        function updateDashboard() {
            fetchStockData('^KS11', 'kospi-card', '코스피 (KOSPI)');
            fetchStockData('^KQ11', 'kosdaq-card', '코스닥 (KOSDAQ)');
            fetchExchangeRates();
            
            const now = new Date();
            const timeString = now.toLocaleTimeString('ko-KR', { hour12: false });
            document.getElementById('last-updated').innerText = `마지막 업데이트: ${timeString}`;
        }

        // 초기 로드
        updateDashboard();

        // 30초마다 자동 갱신
        setInterval(updateDashboard, 30000);
    </script>
</body>
</html>

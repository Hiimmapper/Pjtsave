<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ambient Morning Dashboard</title>
    <style>
        /* 프리미엄 미니멀리즘 다크 테마 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #000000;
            color: #EAEAEA;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            overflow: hidden;
            transition: transform 0.5s ease; /* 번인 방지 픽셀 시프트를 위한 애니메이션 */
        }

        /* 1. 상단 시계 & 현재 날씨 영역 */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #1A1A1A;
            padding-bottom: 20px;
        }
        .time-box h1 {
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            color: #ffffff;
        }
        .time-box p {
            font-size: 1.1rem;
            color: #888888;
            margin-top: 6px;
            font-weight: 400;
        }
        .current-weather {
            text-align: right;
        }
        .current-weather .temp {
            font-size: 2.5rem;
            font-weight: 300;
            color: #ffffff;
        }
        .current-weather .desc {
            font-size: 0.9rem;
            color: #888888;
        }

        /* 2. 중단 1: 확장된 시간대별 날씨 (가로 스크롤 카드) */
        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #555555;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .hourly-container {
            margin: 15px 0;
        }
        .hourly-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 10px;
            scrollbar-width: none; /* 파이어폭스용 */
        }
        .hourly-scroll::-webkit-scrollbar { display: none; /* 크롬/사파리용 */ }
        .hourly-card {
            min-width: 75px;
            background: #0A0A0A;
            border: 1px solid #161616;
            border-radius: 12px;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .hourly-card .h-time { font-size: 0.8rem; color: #888888; margin-bottom: 6px; }
        .hourly-card .h-icon { font-size: 1.5rem; margin: 4px 0; }
        .hourly-card .h-temp { font-size: 1rem; font-weight: 600; color: #ffffff; }

        /* 3. 중단 2: 실시간 이슈 주요 뉴스 (롤링 애니메이션) */
        .news-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin: 15px 0;
            min-height: 120px;
        }
        .news-wrapper {
            position: relative;
            height: 70px;
            overflow: hidden;
        }
        .news-item {
            font-size: 1.35rem;
            line-height: 1.45;
            font-weight: 500;
            color: #E5E5E5;
            word-break: keep-all;
            position: absolute;
            width: 100%;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .news-item.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 4. 하단: 경제 지표 금융 전광판 */
        .economy-container {
            border-top: 1px solid #1A1A1A;
            padding-top: 15px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="time-box">
            <h1 id="txt-time">00:00</h1>
            <p id="txt-date">로딩 중...</p>
        </div>
        <div class="current-weather">
            <div class="temp" id="cur-temp">--°</div>
            <div class="desc" id="cur-location">위치 찾는 중...</div>
        </div>
    </div>

    <div class="hourly-container">
        <div class="section-title">Hourly Forecast</div>
        <div class="hourly-scroll" id="hourly-wrapper">
            <div class="hourly-card" style="width:100%;"><span class="h-time" style="color:#aaa;">날씨 정보를 불러오는 중입니다...</span></div>
        </div>
    </div>

    <div class="news-container">
        <div class="section-title">Latest Top Stories</div>
        <div class="news-wrapper" id="news-wrapper">
            <div class="news-item active">실시간 주요 이슈를 불러오는 중입니다...</div>
        </div>
    </div>

    <div class="economy-container">
        <div class="section-title">Market Overview</div>
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    { "description": "코스피", "proName": "KRX:KOSPI" },
                    { "description": "S&P 500", "proName": "FOREXCOM:SPXUSD" },
                    { "description": "나스닥 100", "proName": "NASDAQ:NDX" },
                    { "description": "원/달러 환율", "proName": "FX_IDC:USDKRW" },
                    { "description": "비트코인", "proName": "BINANCE:BTCUSDT" }
                ],
                "showSymbolLogo": true,
                "colorTheme": "dark",
                "isTransparent": true,
                "displayMode": "adaptive",
                "locale": "kr"
            }
            </script>
        </div>
    </div>

    <script>
        // 코드 커스텀 매개변수 설정 (제공해주신 API 키 적용 완료)
        const OPENWEATHER_API_KEY = '3d64d44f9efaef9fff346626e18910c7';

        // 1. 실시간 시계 설정 (1초 주기 업데이트)
        function initClock() {
            const txtTime = document.getElementById('txt-time');
            const txtDate = document.getElementById('txt-date');
            
            function update() {
                const now = new Date();
                txtTime.innerText = now.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
                txtDate.innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            }
            setInterval(update, 1000);
            update();
        }

        // 2. GPS 위치 기반 날씨 가져오기 (OpenWeatherMap 5 day / 3 hour forecast API 이용)
        function initWeather() {
            if (!navigator.geolocation) {
                document.getElementById('cur-location').innerText = "GPS 미지원 기기";
                fallbackWeather();
                return;
            }

            // 최초 로딩 속도를 높이기 위해 캐시된 위치 정보(maximumAge)를 먼저 활용합니다.
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    fetchWeatherData(lat, lon);
                },
                (error) => {
                    console.error("GPS 권한 거부 또는 오류, 기본 좌표로 불러옵니다.", error);
                    fallbackWeather();
                },
                { enableHighAccuracy: false, maximumAge: 600000, timeout: 10000 }
            );
        }

        function fallbackWeather() {
            // 권한 거부 시 기본값 (대한민국 부산 좌표 기준 - 접속 위치 반영)
            fetchWeatherData(35.1796, 129.0756);
        }

        async function fetchWeatherData(lat, lon) {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${OPENWEATHER_API_KEY}&units=metric&lang=kr`);
                const data = await response.json();
                
                if (data.cod !== "200") {
                    throw new Error("날씨 API 호출 오류: " + data.message);
                }

                // 현재 날씨 처리 (첫 번째 데이터 활용)
                const current = data.list[0];
                document.getElementById('cur-temp').innerText = `${Math.round(current.main.temp)}°`;
                document.getElementById('cur-location').innerText = data.city.name;

                // 시간대별 날씨 배열 처리 (상위 7개 아이템 = 향후 약 21시간 예보)
                const hourlyWrapper = document.getElementById('hourly-wrapper');
                hourlyWrapper.innerHTML = ''; // 플레이스홀더 초기화

                const weatherIcons = { "Clear": "☀️", "Clouds": "☁️", "Rain": "🌧️", "Drizzle": "🌧️", "Thunderstorm": "⛈️", "Snow": "❄️", "Atmosphere": "🌫️" };
                // ⛅(구름조금) 처리를 위해 Clouds 세분화 추가 보정 (선택 사항)

                data.list.slice(0, 7).forEach(item => {
                    const dateObj = new Date(item.dt * 1000);
                    let hours = dateObj.getHours();
                    const ampm = hours >= 12 ? '오후' : '오전';
                    hours = hours % 12;
                    hours = hours ? hours : 12; // 0시는 12시로 표시
                    
                    const timeStr = `${ampm} ${hours}시`;
                    const mainWeather = item.weather[0].main;
                    
                    // 구름양에 따른 아이콘 디테일 처리
                    let icon = weatherIcons[mainWeather] || "☀️";
                    if (mainWeather === "Clouds" && item.clouds.all < 50) {
                        icon = "⛅"; 
                    }

                    const temp = `${Math.round(item.main.temp)}°`;

                    const card = document.createElement('div');
                    card.className = 'hourly-card';
                    card.innerHTML = `
                        <span class="h-time">${timeStr}</span>
                        <span class="h-icon">${icon}</span>
                        <span class="h-temp">${temp}</span>
                    `;
                    hourlyWrapper.appendChild(card);
                });

            } catch (err) {
                console.error("날씨 데이터를 가져오지 못했습니다.", err);
                document.getElementById('cur-location').innerText = "날씨 로드 실패";
            }
        }

        // 3. 구글 뉴스 RSS 피드 파싱 및 무한 롤링 기능
        async function initNews() {
            const newsWrapper = document.getElementById('news-wrapper');
            const googleNewsRss = encodeURIComponent('https://news.google.com/rss?hl=ko&gl=KR&ceid=KR:ko');
            const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${googleNewsRss}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if(data.status === 'ok' && data.items.length > 0) {
                    newsWrapper.innerHTML = ''; 
                    
                    data.items.slice(0, 8).forEach((item, index) => {
                        const newsEl = document.createElement('div');
                        newsEl.className = index === 0 ? 'news-item active' : 'news-item';
                        const cleanTitle = item.title.split(' - ')[0];
                        newsEl.innerText = cleanTitle;
                        newsWrapper.appendChild(newsEl);
                    });

                    startNewsRolling();
                }
            } catch (err) {
                console.error("뉴스를 로드할 수 없습니다.", err);
            }
        }

        function startNewsRolling() {
            let currentIndex = 0;
            setInterval(() => {
                const items = document.querySelectorAll('.news-item');
                if(items.length <= 1) return;

                items[currentIndex].classList.remove('active');
                currentIndex = (currentIndex + 1) % items.length;
                items[currentIndex].classList.add('active');
            }, 7000); // 7초마다 변경
        }

        // 4. 모바일 기기 화면 꺼짐 방지 (Wake Lock API)
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock 활성화 완료: 화면이 꺼지지 않습니다.');
                }
            } catch (err) {
                console.warn(`Wake Lock 실패: ${err.name}, ${err.message}`);
            }
        }

        // 5. 번인 방지(Pixel Shifting) 알고리즘
        function initAntiBurnIn() {
            setInterval(() => {
                const randomX = Math.floor(Math.random() * 7) - 3;
                const randomY = Math.floor(Math.random() * 7) - 3;
                document.body.style.transform = `translate(${randomX}px, ${randomY}px)`;
            }, 300000); // 5분마다 미세 이동
        }

        // 초기화 실행
        window.addEventListener('DOMContentLoaded', () => {
            initClock();
            initWeather();
            initNews();
            initAntiBurnIn();
            
            document.body.addEventListener('click', requestWakeLock);
            requestWakeLock();

            // 데이터 자동 갱신 (날씨는 1시간, 뉴스는 30분 단위)
            setInterval(initWeather, 3600000); 
            setInterval(initNews, 1800000);
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                initWeather();
                requestWakeLock();
            }
        });
    </script>
</body>
</html>

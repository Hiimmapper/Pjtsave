<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Ambient Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            color: #EAEAEA;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh; overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; gap: 20px; padding: 30px;
            background-color: #050505; background-attachment: fixed; background-size: cover; background-position: center;
            transition: background-image 1s ease-in-out; scrollbar-width: none;
        }
        body::-webkit-scrollbar { display: none; }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.9) 100%); z-index: -1;
        }

        /* 1. 상단: 시계 & 날씨 */
        .header-container {
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15); padding-bottom: 20px;
        }
        .time-box { display: flex; align-items: baseline; gap: 15px; flex-wrap: wrap; }
        .time-box h1 { font-size: 5rem; font-weight: 800; letter-spacing: -2px; line-height: 1; color: #fff; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .time-box p { font-size: 2rem; color: #ddd; font-weight: 700; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .weather-box { text-align: right; text-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .weather-box .location { font-size: 1.1rem; color: #00e676; font-weight: 600; margin-bottom: 5px; display: flex; justify-content: flex-end; align-items: center; gap: 5px; }
        .weather-box .temp { font-size: 3.5rem; font-weight: 300; color: #fff; line-height: 1; }
        .weather-box .desc { font-size: 1rem; color: #ddd; margin-top: 5px; font-weight: 500; }

        /* 중단 1: 3시간 단위 날씨 */
        .hourly-container { margin: 15px 0; }
        .section-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; margin-bottom: 12px; font-weight: 700; }
        .hourly-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; }
        .hourly-scroll::-webkit-scrollbar { display: none; }
        .hourly-card {
            min-width: 85px; background: rgba(20, 20, 20, 0.6); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px); border-radius: 16px; padding: 18px 10px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .hourly-card .h-time { font-size: 0.9rem; color: #ccc; margin-bottom: 8px; font-weight: 500; }
        .hourly-card .h-icon { font-size: 2rem; margin: 5px 0; }
        .hourly-card .h-temp { font-size: 1.2rem; font-weight: 700; color: #fff; margin-top: 8px; }

        /* 중단 2: 실시간 증권/환율 정보 (자체 UI 복구) */
        .finance-container { margin-bottom: 15px; }
        .finance-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .finance-card {
            background: rgba(10, 10, 10, 0.7); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); border-radius: 12px; padding: 15px;
            display: flex; flex-direction: column; justify-content: center; min-height: 110px;
        }
        .f-title { font-size: 0.85rem; color: #aaa; font-weight: 600; margin-bottom: 8px; }
        .f-price { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 4px; letter-spacing: -0.5px; }
        .f-change { font-size: 0.95rem; font-weight: 600; }
        .up { color: #ff4d4d; } .down { color: #4d79ff; } .flat { color: #aaaaaa; }

        /* 하단: 뉴스 리스트 */
        .news-container { border-top: 1px solid rgba(255, 255, 255, 0.15); padding-top: 20px; padding-bottom: 30px; flex-grow: 1; }
        .news-wrapper { display: flex; flex-direction: column; gap: 14px; margin-top: 15px; }
        .news-item { font-size: 1.25rem; line-height: 1.4; font-weight: 600; color: #fff; word-break: keep-all; text-shadow: 0 2px 10px rgba(0,0,0,0.8); display: flex; align-items: flex-start; }
        .news-tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: 700; margin-right: 12px; white-space: nowrap; margin-top: 2px; }
        .tag-sbs { background-color: #00bcd4; color: #000; }
        .tag-hk { background-color: #ff9800; color: #000; }

    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="header-container">
        <div class="time-box">
            <h1 id="txt-time">00:00</h1>
            <p id="txt-date">시간 연동 중...</p>
        </div>
        <div class="weather-box">
            <div class="location" id="cur-location">📍 위치 탐색 중...</div>
            <div class="temp" id="cur-temp">--°</div>
            <div class="desc" id="cur-desc">날씨 연동 중...</div>
        </div>
    </div>

    <div class="hourly-container">
        <div class="section-title">24-Hour Weather Flow</div>
        <div class="hourly-scroll" id="hourly-wrapper">
            <div class="hourly-card" style="width:100%;"><span class="h-time">날씨 데이터 연동 중...</span></div>
        </div>
    </div>

    <div class="finance-container">
        <div class="section-title">Market Indicators</div>
        <div class="finance-grid">
            <div class="finance-card">
                <span class="f-title">USD/KRW 환율</span>
                <span class="f-price" id="val-usd">데이터 로딩중...</span>
                <span class="f-change flat">- 실시간 기준환율</span>
            </div>
            <div class="finance-card">
                <span class="f-title">KOSPI</span>
                <span class="f-price" id="val-kospi">데이터 로딩중...</span>
                <span class="f-change" id="change-kospi">잠시만 기다려주세요</span>
            </div>
            <div class="finance-card">
                <span class="f-title">KOSDAQ</span>
                <span class="f-price" id="val-kosdaq">데이터 로딩중...</span>
                <span class="f-change" id="change-kosdaq">잠시만 기다려주세요</span>
            </div>
            <div class="finance-card">
                <span class="f-title">NASDAQ</span>
                <span class="f-price" id="val-nasdaq">데이터 로딩중...</span>
                <span class="f-change" id="change-nasdaq">잠시만 기다려주세요</span>
            </div>
        </div>
    </div>

    <div class="news-container">
        <div class="section-title">Live Updates : Economy News</div>
        <div class="news-wrapper" id="news-wrapper">
            <div class="news-item">뉴스를 불러오는 중입니다...</div>
        </div>
    </div>

    <script>
        const formatNum = (num) => parseFloat(num).toLocaleString('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // 1. 시계
        function initClock() {
            const update = () => {
                const now = new Date();
                document.getElementById('txt-time').innerText = now.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
                document.getElementById('txt-date').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            };
            update();
            setInterval(update, 1000);
        }

        // 2. 날씨 (기존 정상 작동)
        function initWeather() {
            if (!navigator.geolocation) {
                fetchWeatherData(35.1796, 129.0756); 
                return;
            }
            navigator.geolocation.getCurrentPosition(
                pos => fetchWeatherData(pos.coords.latitude, pos.coords.longitude),
                err => { fetchWeatherData(35.1796, 129.0756); },
                { enableHighAccuracy: false, maximumAge: 600000, timeout: 5000 }
            );
        }

        async function fetchWeatherData(lat, lon) {
            try {
                try {
                    const geoRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ko`);
                    const geoData = await geoRes.json();
                    document.getElementById('cur-location').innerText = `📍 ${geoData.city || ''} ${geoData.locality || '대한민국'}`.trim();
                } catch(e) { document.getElementById('cur-location').innerText = '📍 위치 파악 불가'; }

                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,weathercode&timezone=auto`);
                const data = await res.json();
                
                const cur = data.current_weather;
                document.getElementById('cur-temp').innerText = `${Math.round(cur.temperature)}°`;
                
                let icon = "☀️", desc = "맑음", bgUrl = "https://images.unsplash.com/photo-1601297183305-6df142704ea2?q=80&w=1920&auto=format&fit=crop";
                const code = cur.weathercode;
                
                if (code > 0 && code <= 3) { icon = "⛅"; desc = "구름조금"; }
                else if (code >= 45 && code <= 48) { icon = "🌫️"; desc = "안개"; bgUrl = "https://images.unsplash.com/photo-1485236715568-ddc5ee6ca227?q=80&w=1920&auto=format&fit=crop"; }
                else if (code >= 51 && code <= 69) { icon = "🌧️"; desc = "비"; bgUrl = "https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?q=80&w=1920&auto=format&fit=crop"; }
                else if (code >= 71 && code <= 79) { icon = "❄️"; desc = "눈"; bgUrl = "https://images.unsplash.com/photo-1491002052546-bf38f186af56?q=80&w=1920&auto=format&fit=crop"; }
                else if (code >= 80) { icon = "⛈️"; desc = "흐림/천둥"; bgUrl = "https://images.unsplash.com/photo-1534088568595-a066f410cbda?q=80&w=1920&auto=format&fit=crop"; }

                document.getElementById('cur-desc').innerText = desc;
                document.body.style.backgroundImage = `url('${bgUrl}')`;

                const hourlyWrapper = document.getElementById('hourly-wrapper');
                hourlyWrapper.innerHTML = '';
                const nowHour = new Date().getHours();
                let startIndex = data.hourly.time.findIndex(t => new Date(t).getHours() === nowHour && new Date(t) >= new Date().setHours(0,0,0,0));
                if(startIndex === -1) startIndex = 0;

                for (let i = startIndex; i < startIndex + 24; i += 3) {
                    if (!data.hourly.time[i]) break;
                    const tDate = new Date(data.hourly.time[i]);
                    const ampm = tDate.getHours() >= 12 ? '오후' : '오전';
                    const hr = tDate.getHours() % 12 || 12;
                    const hTemp = Math.round(data.hourly.temperature_2m[i]);
                    const hCode = data.hourly.weathercode[i];
                    
                    let hIcon = "☀️";
                    if (hCode > 0 && hCode <= 3) hIcon = "⛅";
                    else if (hCode >= 45 && hCode <= 48) hIcon = "🌫️";
                    else if (hCode >= 51 && hCode <= 69) hIcon = "🌧️";
                    else if (hCode >= 71 && hCode <= 79) hIcon = "❄️";
                    else if (hCode >= 80) hIcon = "⛈️";

                    hourlyWrapper.innerHTML += `<div class="hourly-card"><span class="h-time">${ampm} ${hr}시</span><span class="h-icon">${hIcon}</span><span class="h-temp">${hTemp}°</span></div>`;
                }
            } catch (err) { document.getElementById('cur-desc').innerText = "날씨 정보 수신 지연"; }
        }

        // 3. 증권 (자체 카드 UI + 무적 방어 다중 우회 로직)
        async function fetchWithFallback(url) {
            const encodedUrl = encodeURIComponent(url);
            // 3개의 우회 서버를 순차적으로 시도합니다. (하나가 죽어도 다음 서버가 작동)
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodedUrl}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodedUrl}`,
                `https://corsproxy.io/?${url}`
            ];

            for (let proxy of proxies) {
                try {
                    const res = await fetch(proxy, { cache: 'no-store' });
                    if (res.ok) return await res.json();
                } catch (e) { console.warn("Proxy failed, trying next...", proxy); }
            }
            throw new Error("All proxies failed.");
        }

        async function initFinance() {
            // 환율 (개방형 API라 절대 막히지 않음)
            try {
                const exRes = await fetch('https://open.er-api.com/v6/latest/USD');
                const exData = await exRes.json();
                document.getElementById('val-usd').innerText = formatNum(exData.rates.KRW) + ' ₩';
            } catch(e) { document.getElementById('val-usd').innerText = "지연됨"; }

            // 주식 (다중 우회 서버 적용)
            try {
                // 캐시 초기화를 위해 난수 추가
                const stockUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=^KS11,^KQ11,^IXIC&t=${Date.now()}`;
                const data = await fetchWithFallback(stockUrl);
                const stocks = data.quoteResponse.result;

                stocks.forEach(item => {
                    const price = item.regularMarketPrice ? formatNum(item.regularMarketPrice) : '0.00';
                    const change = item.regularMarketChange || 0;
                    const percent = item.regularMarketChangePercent || 0;
                    const colorCls = change > 0 ? 'up' : (change < 0 ? 'down' : 'flat');
                    const sign = change > 0 ? '▲' : (change < 0 ? '▼' : '-');
                    const changeHtml = `<span class="${colorCls}">${sign} ${formatNum(Math.abs(change))} (${percent.toFixed(2)}%)</span>`;

                    if(item.symbol === '^KS11') {
                        document.getElementById('val-kospi').innerText = price;
                        document.getElementById('change-kospi').innerHTML = changeHtml;
                    }
                    if(item.symbol === '^KQ11') {
                        document.getElementById('val-kosdaq').innerText = price;
                        document.getElementById('change-kosdaq').innerHTML = changeHtml;
                    }
                    if(item.symbol === '^IXIC') {
                        document.getElementById('val-nasdaq').innerText = price;
                        document.getElementById('change-nasdaq').innerHTML = changeHtml;
                    }
                });
            } catch(e) {
                console.error("증권 모두 지연");
                document.getElementById('val-kospi').innerText = "일시 지연";
                document.getElementById('val-kosdaq').innerText = "일시 지연";
                document.getElementById('val-nasdaq').innerText = "일시 지연";
            }
        }

        // 4. 뉴스 (구글 뉴스 버리고, 차단 없는 SBS/한국경제 RSS 사용)
        async function initNews() {
            try {
                // 구글 뉴스 대비 압도적으로 빠르고 차단 없는 공식 피드
                const sbsUrl = 'https://news.sbs.co.kr/news/SectionRssFeed.do?sectionId=02&plink=RSSREADER';
                const hkUrl = 'https://rss.hankyung.com/feed/economy.xml';

                // rss2json API로 깔끔하게 파싱 (XML 파싱 오류 방지)
                const [res1, res2] = await Promise.all([
                    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(sbsUrl)}`),
                    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(hkUrl)}`)
                ]);
                
                const data1 = await res1.json();
                const data2 = await res2.json();

                let combinedNews = [];
                
                if (data1.status === 'ok') {
                    data1.items.slice(0, 5).forEach(item => {
                        combinedNews.push(`<span class="news-tag tag-sbs">SBS 경제</span> <span>${item.title}</span>`);
                    });
                }
                if (data2.status === 'ok') {
                    data2.items.slice(0, 5).forEach(item => {
                        combinedNews.push(`<span class="news-tag tag-hk">한국경제</span> <span>${item.title}</span>`);
                    });
                }

                combinedNews.sort(() => Math.random() - 0.5);

                if (combinedNews.length > 0) {
                    const wrapper = document.getElementById('news-wrapper');
                    wrapper.innerHTML = '';
                    combinedNews.slice(0, 5).forEach((newsHtml) => {
                        wrapper.innerHTML += `<div class="news-item">${newsHtml}</div>`;
                    });
                } else {
                    throw new Error("뉴스 배열이 비어있음");
                }
            } catch (err) { 
                console.error("뉴스 에러", err);
                document.getElementById('news-wrapper').innerHTML = '<div class="news-item">뉴스 로딩에 실패했습니다. 다음 주기에 재시도합니다.</div>'; 
            }
        }

        // 번인 방지
        function initAntiBurnIn() {
            setInterval(() => {
                const x = Math.floor(Math.random() * 5) - 2;
                const y = Math.floor(Math.random() * 5) - 2;
                document.body.style.transform = `translate(${x}px, ${y}px)`;
            }, 300000);
        }

        async function wakeLock() { try { await navigator.wakeLock.request('screen'); } catch (e) {} }

        document.addEventListener('DOMContentLoaded', () => {
            initClock(); 
            initWeather(); 
            initFinance(); 
            initNews(); 
            initAntiBurnIn();
            
            document.body.addEventListener('click', wakeLock); 
            wakeLock();
            
            // 데이터 자동 갱신
            setInterval(initWeather, 1800000); // 30분
            setInterval(initNews, 1800000);    // 30분
            setInterval(initFinance, 600000);  // 10분
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dynamic Ambient Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            color: #EAEAEA;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            overflow: hidden;
            background-color: #000;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out, transform 0.5s ease;
        }

        /* 배경을 어둡게 눌러주어 텍스트 가독성 확보 */
        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }

        /* 1. 상단: 시계 & 현재 날씨 */
        .header-container {
            display: flex; justify-content: space-between; align-items: flex-start;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding-bottom: 25px;
        }
        .time-box h1 { font-size: 5rem; font-weight: 700; letter-spacing: -2px; line-height: 1; color: #ffffff; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .time-box p { font-size: 1.2rem; color: #cccccc; margin-top: 8px; font-weight: 500; }
        .current-weather { text-align: right; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .current-weather .temp { font-size: 3.5rem; font-weight: 300; color: #ffffff; line-height: 1; }
        .current-weather .desc { font-size: 1.1rem; color: #dddddd; margin-top: 5px; font-weight: 500; }

        /* 2. 중단: 시간대별 날씨 */
        .hourly-container { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; margin: 25px 0; }
        .section-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; color: #bbbbbb; margin-bottom: 15px; font-weight: 600; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }
        .hourly-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; scrollbar-width: none; }
        .hourly-scroll::-webkit-scrollbar { display: none; }
        .hourly-card {
            min-width: 90px; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); border-radius: 18px; padding: 20px 10px;
            display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .hourly-card .h-time { font-size: 0.9rem; color: #dddddd; margin-bottom: 10px; font-weight: 500; }
        .hourly-card .h-icon { font-size: 2.2rem; margin: 5px 0; }
        .hourly-card .h-temp { font-size: 1.2rem; font-weight: 600; color: #ffffff; margin-top: 10px; }

        /* 3. 하단 1: 뉴스 롤링 */
        .news-container { border-top: 1px solid rgba(255, 255, 255, 0.2); padding-top: 20px; height: 110px; }
        .news-wrapper { position: relative; height: 60px; overflow: hidden; }
        .news-item {
            font-size: 1.4rem; line-height: 1.4; font-weight: 600; color: #ffffff; word-break: keep-all; text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
            position: absolute; width: 100%; opacity: 0; transform: translateY(15px); transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .news-item.active { opacity: 1; transform: translateY(0); }

        /* 4. 하단 2: 자체 구축 증권 전광판 (한국식 색상 적용) */
        .stock-container { display: flex; gap: 20px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        .stock-container::-webkit-scrollbar { display: none; }
        .stock-card {
            display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.6); padding: 10px 15px;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); min-width: 140px; white-space: nowrap;
        }
        .s-title { font-size: 0.85rem; color: #bbbbbb; font-weight: 600; margin-bottom: 5px; }
        .s-price { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 2px; }
        .s-change { font-size: 0.95rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div class="header-container">
        <div class="time-box">
            <h1 id="txt-time">00:00</h1>
            <p id="txt-date">시간 연동 중...</p>
        </div>
        <div class="current-weather">
            <div class="temp" id="cur-temp">--°</div>
            <div class="desc" id="cur-location">날씨 연동 중...</div>
        </div>
    </div>

    <div class="hourly-container">
        <div class="section-title">Today's Weather Flow</div>
        <div class="hourly-scroll" id="hourly-wrapper">
            <div class="hourly-card" style="width:100%;"><span class="h-time">위치 파악 및 날씨 데이터 호출 중...</span></div>
        </div>
    </div>

    <div class="news-container">
        <div class="section-title">Latest Updates</div>
        <div class="news-wrapper" id="news-wrapper">
            <div class="news-item active">실시간 주요 뉴스를 불러오는 중입니다...</div>
        </div>
        <div class="stock-container" id="stock-wrapper">
            <div class="stock-card"><span class="s-title">MARKET DATA</span><span class="s-price">로딩중...</span></div>
        </div>
    </div>

    <script>
        // 1. 실시간 시계
        function initClock() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('txt-time').innerText = now.toLocaleTimeString('ko-KR', { hour12: false, hour: '2-digit', minute: '2-digit' });
                document.getElementById('txt-date').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            }, 1000);
        }

        // 2. 날씨 (Open-Meteo API: No Key Required) 및 배경 이미지 연동
        function initWeather() {
            navigator.geolocation.getCurrentPosition(
                pos => fetchWeatherData(pos.coords.latitude, pos.coords.longitude),
                err => { console.warn("GPS 거부됨. 서울 기준 로드."); fetchWeatherData(37.5665, 126.9780); },
                { enableHighAccuracy: false, maximumAge: 600000, timeout: 10000 }
            );
        }

        async function fetchWeatherData(lat, lon) {
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,weathercode&timezone=auto`;
                const res = await fetch(url);
                const data = await res.json();
                
                const cur = data.current_weather;
                document.getElementById('cur-temp').innerText = `${Math.round(cur.temperature)}°`;
                
                // 날씨 코드에 따른 아이콘, 텍스트 및 배경화면 매핑 (WMO 기준)
                let icon = "☀️", desc = "맑음", bgUrl = "";
                const code = cur.weathercode;
                
                if (code <= 3) { icon = code > 0 ? "⛅" : "☀️"; desc = code > 0 ? "구름조금" : "맑음"; bgUrl = "https://images.unsplash.com/photo-1601297183305-6df142704ea2?q=80&w=1920&auto=format&fit=crop"; }
                else if (code >= 45 && code <= 48) { icon = "🌫️"; desc = "안개"; bgUrl = "https://images.unsplash.com/photo-1485236715568-ddc5ee6ca227?q=80&w=1920&auto=format&fit=crop"; }
                else if (code >= 51 && code <= 69) { icon = "🌧️"; desc = "비"; bgUrl = "https://images.unsplash.com/photo-1515694346937-94d85e41e6f0?q=80&w=1920&auto=format&fit=crop"; }
                else if (code >= 71 && code <= 79) { icon = "❄️"; desc = "눈"; bgUrl = "https://images.unsplash.com/photo-1491002052546-bf38f186af56?q=80&w=1920&auto=format&fit=crop"; }
                else { icon = "⛈️"; desc = "흐림/천둥"; bgUrl = "https://images.unsplash.com/photo-1534088568595-a066f410cbda?q=80&w=1920&auto=format&fit=crop"; }

                document.getElementById('cur-location').innerText = desc;
                document.body.style.backgroundImage = `url('${bgUrl}')`;

                // 시간대별 날씨 렌더링
                const hourlyWrapper = document.getElementById('hourly-wrapper');
                hourlyWrapper.innerHTML = '';
                
                const nowHour = new Date().getHours();
                // 현재 시간과 일치하는 가장 가까운 인덱스 찾기
                let startIndex = data.hourly.time.findIndex(t => new Date(t).getHours() === nowHour && new Date(t) >= new Date().setHours(0,0,0,0));
                if(startIndex === -1) startIndex = 0;

                for (let i = startIndex; i < startIndex + 10; i++) {
                    if (!data.hourly.time[i]) break;
                    
                    const tDate = new Date(data.hourly.time[i]);
                    const ampm = tDate.getHours() >= 12 ? '오후' : '오전';
                    const hr = tDate.getHours() % 12 || 12;
                    const hTemp = Math.round(data.hourly.temperature_2m[i]);
                    const hCode = data.hourly.weathercode[i];
                    
                    let hIcon = "☀️";
                    if (hCode > 0 && hCode <= 3) hIcon = "⛅";
                    else if (hCode >= 45 && hCode <= 48) hIcon = "🌫️";
                    else if (hCode >= 51 && hCode <= 69) hIcon = "🌧️";
                    else if (hCode >= 71 && hCode <= 79) hIcon = "❄️";
                    else if (hCode >= 80) hIcon = "⛈️";

                    hourlyWrapper.innerHTML += `
                        <div class="hourly-card">
                            <span class="h-time">${ampm} ${hr}시</span>
                            <span class="h-icon">${hIcon}</span>
                            <span class="h-temp">${hTemp}°</span>
                        </div>
                    `;
                }
            } catch (err) { console.error("날씨 로드 실패", err); }
        }

        // 3. 네이버 뉴스 원본 다이렉트 파싱
        async function initNews() {
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://news.google.com/rss?hl=ko&gl=KR&ceid=KR:ko')}`);
                const data = await res.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                
                if (items.length > 0) {
                    const wrapper = document.getElementById('news-wrapper');
                    wrapper.innerHTML = '';
                    Array.from(items).slice(0, 10).forEach((item, i) => {
                        wrapper.innerHTML += `<div class="news-item ${i === 0 ? 'active' : ''}">${item.querySelector("title").textContent.split(' - ')[0]}</div>`;
                    });
                    startNewsRolling();
                }
            } catch (err) { console.error("뉴스 로드 실패", err); }
        }

        let newsInterval;
        function startNewsRolling() {
            clearInterval(newsInterval);
            let idx = 0;
            newsInterval = setInterval(() => {
                const items = document.querySelectorAll('.news-item');
                if (items.length < 2) return;
                items[idx].classList.remove('active');
                idx = (idx + 1) % items.length;
                items[idx].classList.add('active');
            }, 6000);
        }

        // 4. 지연 없는 실시간 증권 (프록시 + Yahoo Finance 조합으로 한국 시장 즉각 반응형 렌더링)
        async function initStock() {
            try {
                // 코스피(^KS11), 코스닥(^KQ11), 나스닥(^IXIC), 원/달러 환율(KRW=X)
                const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5EKS11,%5EKQ11,%5EIXIC,KRW=X`;
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                const parsed = JSON.parse(data.contents);
                const results = parsed.quoteResponse.result;

                let html = '';
                results.forEach(item => {
                    let name = item.symbol;
                    if (name === '^KS11') name = '코스피 (KOSPI)';
                    else if (name === '^KQ11') name = '코스닥 (KOSDAQ)';
                    else if (name === '^IXIC') name = '나스닥 (NASDAQ)';
                    else if (name === 'KRW=X') name = '원/달러 환율';

                    const price = item.regularMarketPrice ? item.regularMarketPrice.toLocaleString('ko-KR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) : '0.00';
                    const change = item.regularMarketChange || 0;
                    const percent = item.regularMarketChangePercent || 0;
                    
                    // 한국식 주식 색상: 상승=빨강, 하락=파랑
                    const color = change > 0 ? '#ff4d4d' : (change < 0 ? '#4d79ff' : '#aaaaaa');
                    const sign = change > 0 ? '▲' : (change < 0 ? '▼' : '-');

                    html += `
                        <div class="stock-card">
                            <span class="s-title">${name}</span>
                            <span class="s-price">${price}</span>
                            <span class="s-change" style="color: ${color};">${sign} ${Math.abs(change).toFixed(2)} (${percent.toFixed(2)}%)</span>
                        </div>
                    `;
                });
                document.getElementById('stock-wrapper').innerHTML = html;
            } catch (err) {
                console.error("증권 로드 실패", err);
                document.getElementById('stock-wrapper').innerHTML = '<span style="color:#aaa;">데이터를 불러올 수 없습니다.</span>';
            }
        }

        // 번인 방지 (5분마다 미세 이동)
        function initAntiBurnIn() {
            setInterval(() => {
                const x = Math.floor(Math.random() * 7) - 3;
                const y = Math.floor(Math.random() * 7) - 3;
                document.body.style.transform = `translate(${x}px, ${y}px)`;
            }, 300000);
        }

        // 화면 꺼짐 방지
        async function wakeLock() { try { await navigator.wakeLock.request('screen'); } catch (e) {} }

        // 전체 초기화
        window.onload = () => {
            initClock(); initWeather(); initNews(); initStock(); initAntiBurnIn();
            document.body.addEventListener('click', wakeLock); wakeLock();
            
            // 데이터 갱신 주기: 날씨(30분), 뉴스(30분), 증권(1분 단위로 실시간성 확보)
            setInterval(initWeather, 1800000);
            setInterval(initNews, 1800000);
            setInterval(initStock, 60000);
        };
    </script>
</body>
</html>

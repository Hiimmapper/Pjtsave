<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 글로벌 금융 & 환경 대시보드</title>
    <style>
        :root {
            --bg-main: #1a1a2e;
            --bg-card: #16213e;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --color-up-kr: #ff3333;
            --color-down-kr: #3377ff;
            --color-up-us: #10b981;
            --color-down-us: #ef4444;
            --color-error: #f59e0b;
            --border-color: #2a2a4a;
            --warn-bg: rgba(255, 200, 0, 0.15);
            --warn-high: #ef4444;
            --primary: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* --- Section 1: Time & Weather --- */
        .top-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .time-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .clock {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .date {
            font-size: 1.2rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        .weather-scroll-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) transparent;
        }

        .weather-scroll-container::-webkit-scrollbar {
            height: 8px;
        }
        .weather-scroll-container::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 4px;
        }

        .weather-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 280px;
            flex-shrink: 0;
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .delete-btn:hover { color: var(--color-error); }

        .weather-location {
            font-size: 1rem;
            color: var(--text-sub);
            font-weight: 600;
            padding-right: 20px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .weather-icon { font-size: 2.5rem; }
        .weather-temp { font-size: 2.2rem; font-weight: 700; }
        .weather-desc { font-size: 1.1rem; font-weight: 600; }

        .weather-sub {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .weather-warning {
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.4;
            font-weight: 600;
            text-align: center;
        }

        .prob-safe { background-color: rgba(16, 185, 129, 0.15); color: #34d399; }
        .prob-warn { background-color: rgba(250, 204, 21, 0.15); color: #facc15; }
        .prob-danger { background-color: rgba(239, 68, 68, 0.15); color: #f87171; }

        .add-location-card {
            background-color: transparent;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            min-width: 250px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background-color 0.2s;
        }

        .add-location-card:hover {
            background-color: rgba(255,255,255,0.02);
        }

        .add-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-form {
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .add-input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-main);
            color: var(--text-main);
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        .add-actions {
            display: flex;
            gap: 10px;
        }

        .add-actions button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-submit { background-color: var(--color-down-kr); color: white; }
        .btn-cancel { background-color: var(--border-color); color: var(--text-main); }

        .separator {
            width: 100%;
            height: 1px;
            background-color: var(--border-color);
            border: none;
            margin: 0;
        }

        /* --- Section 2: Financial Dashboard --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: -10px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .update-time {
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-title {
            font-size: 1rem;
            color: var(--text-sub);
            margin: 0;
            font-weight: 600;
        }

        .price {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
        }

        .change {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .up-kr { color: var(--color-up-kr); }
        .down-kr { color: var(--color-down-kr); }
        .up-us { color: var(--color-up-us); }
        .down-us { color: var(--color-down-us); }
        .neutral { color: var(--text-main); }

        .error-text {
            color: var(--color-error);
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 10px;
        }
        
        .loading {
            color: var(--text-sub);
            font-size: 1rem;
        }

        /* --- Section 3: Economic News --- */
        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .news-header h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .api-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-btn {
            background-color: var(--bg-card);
            color: var(--text-sub);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .sub-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .sub-tab-btn {
            background: var(--bg-card);
            color: var(--text-sub);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .sub-tab-btn:hover { background: #1e293b; }
        .sub-tab-btn.active { background: var(--text-sub); color: var(--bg-main); border-color: var(--text-sub); font-weight: 700; }

        .api-settings-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            background: var(--bg-card);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .api-settings-form input {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-main);
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .article-list {
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .article-card {
            display: flex;
            gap: 15px;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            text-decoration: none;
            color: var(--text-main);
            transition: background 0.2s;
            align-items: center;
            cursor: pointer;
        }

        .article-card:last-child { border-bottom: none; }
        .article-card:hover { background: #1e293b; }
        .article-card:hover .article-title { color: var(--primary); text-decoration: underline; }
        
        .article-num {
            font-size: 1.2rem;
            font-weight: 800;
            color: #475569;
            width: 25px;
            text-align: center;
        }

        .article-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .article-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            transition: color 0.2s;
        }

        .article-meta {
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="top-section">
            <div class="time-container">
                <div id="clock" class="clock">--:--:--</div>
                <div id="date" class="date">----년 --월 --일 (-)</div>
            </div>
            <div class="weather-scroll-container" id="weather-container">
            </div>
        </div>

        <hr class="separator">

        <div class="header">
            <h1>Global Market Dashboard</h1>
            <div class="update-time" id="last-updated">마지막 업데이트: --:--:--</div>
        </div>

        <div class="grid-container">
            <div class="card" id="kospi-card"><h2 class="card-title">코스피 (KOSPI)</h2><div class="loading">데이터 로딩 중...</div></div>
            <div class="card" id="kosdaq-card"><h2 class="card-title">코스닥 (KOSDAQ)</h2><div class="loading">데이터 로딩 중...</div></div>
            <div class="card" id="nasdaq-card"><h2 class="card-title">나스닥 (NASDAQ)</h2><div class="loading">데이터 로딩 중...</div></div>
            <div class="card" id="sp500-card"><h2 class="card-title">S&P 500</h2><div class="loading">데이터 로딩 중...</div></div>
            <div class="card" id="usd-card"><h2 class="card-title">달러/원 (USD/KRW)</h2><div class="loading">데이터 로딩 중...</div></div>
            <div class="card" id="jpy-card"><h2 class="card-title">100엔/원 (JPY 100/KRW)</h2><div class="loading">데이터 로딩 중...</div></div>
        </div>

        <hr class="separator">

        <div>
            <div class="news-header">
                <h2>📰 경제 뉴스</h2>
                <div class="api-controls">
                    <div class="update-time" id="news-updated">마지막 갱신: --:--:--</div>
                    <button class="tab-btn" onclick="toggleApiSettings()">⚙️ API 설정</button>
                </div>
            </div>

            <div class="api-settings-form hidden" id="api-settings-form">
                <input type="text" id="api-newsdata" placeholder="NewsData.io API Key">
                <input type="text" id="api-gnews" placeholder="GNews API Key">
                <button class="btn-submit" onclick="saveApiKeys()">저장</button>
                <button class="btn-cancel" onclick="toggleApiSettings()">취소</button>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" id="main-tab-kr" onclick="setMainTab('kr')">🇰🇷 국내</button>
                <button class="tab-btn" id="main-tab-gl" onclick="setMainTab('gl')">🌐 해외</button>
            </div>

            <div class="sub-tabs" id="sub-tabs-container"></div>

            <div class="article-list" id="article-list">
                <div style="padding:20px; color:var(--text-sub);">기사를 불러오는 중...</div>
            </div>
        </div>
    </div>

    <script>
        // --- Section 1: Time & Weather Logic ---
        function updateClock() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('clock').innerText = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            document.getElementById('date').innerText = 
                `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function parseWeatherCode(code) {
            if (code === 0) return { icon: '☀️', text: '맑음' };
            if ([1, 2, 3].includes(code)) return { icon: '🌤️', text: '구름 조금' };
            if ([45, 48].includes(code)) return { icon: '🌫️', text: '안개' };
            if ([51, 53, 55].includes(code)) return { icon: '🌦️', text: '이슬비' };
            if ([61, 63, 65].includes(code)) return { icon: '🌧️', text: '비' };
            if ([71, 73, 75].includes(code)) return { icon: '❄️', text: '눈' };
            if ([80, 81, 82].includes(code)) return { icon: '🌧️', text: '소나기' };
            if (code === 95) return { icon: '⛈️', text: '뇌우' };
            return { icon: '🌡️', text: '기타' };
        }

        function formatHourSimple(dateObj) {
            let h = dateObj.getHours();
            const ampm = h >= 12 ? '오후' : '오전';
            h = h % 12 || 12;
            return `${ampm} ${h}시`;
        }

        let savedLocations = JSON.parse(localStorage.getItem('weatherLocations')) || [];

        function renderWeatherCards() {
            const container = document.getElementById('weather-container');
            container.innerHTML = `
                <div class="weather-card" id="gps-weather-card">
                    <div class="loading">GPS 위치 및 날씨 정보 확인 중...</div>
                </div>
            `;

            savedLocations.forEach((loc, index) => {
                container.innerHTML += `
                    <div class="weather-card" id="loc-weather-${index}">
                        <div class="loading">${loc.name} 날씨 로딩 중...</div>
                    </div>
                `;
            });

            container.innerHTML += `
                <div class="add-location-card">
                    <button class="add-btn" id="btn-show-add" onclick="showAddFormWeather()">[+ 지역 추가]</button>
                    <div class="add-form" id="add-loc-form">
                        <input type="text" id="loc-input" class="add-input" placeholder="도시명 입력 (예: 서울)">
                        <div class="add-actions">
                            <button class="btn-submit" onclick="addLocation()">추가</button>
                            <button class="btn-cancel" onclick="hideAddFormWeather()">취소</button>
                        </div>
                    </div>
                </div>
            `;

            fetchGpsWeather();
            savedLocations.forEach((loc, index) => fetchWeatherData(loc.lat, loc.lon, loc.name, `loc-weather-${index}`, index));
        }

        async function fetchWeatherData(lat, lon, locationName, elementId, index = null) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&hourly=precipitation_probability&timezone=auto&forecast_days=1`);
                const data = await res.json();
                
                const current = data.current;
                const wInfo = parseWeatherCode(current.weathercode);
                
                const currentHourStart = new Date();
                currentHourStart.setMinutes(0, 0, 0, 0);
                const endOfDay = new Date();
                endOfDay.setHours(23, 59, 59, 999);

                let blocks = [];
                let currentBlock = null;

                for (let i = 0; i < data.hourly.time.length; i++) {
                    const time = new Date(data.hourly.time[i]);
                    if (time < currentHourStart || time > endOfDay) continue;

                    const prob = data.hourly.precipitation_probability[i];

                    if (prob >= 40) {
                        if (!currentBlock) {
                            currentBlock = { start: time, end: time, maxProb: prob };
                        } else {
                            currentBlock.end = time;
                            currentBlock.maxProb = Math.max(currentBlock.maxProb, prob);
                        }
                    } else {
                        if (currentBlock) {
                            blocks.push(currentBlock);
                            currentBlock = null;
                        }
                    }
                }
                if (currentBlock) blocks.push(currentBlock);

                let warningHtml = '';
                const currentProbIndex = data.hourly.time.findIndex(t => new Date(t).getTime() === currentHourStart.getTime());
                const currentProb = currentProbIndex !== -1 ? data.hourly.precipitation_probability[currentProbIndex] : 0;

                if (currentProb >= 40) {
                    warningHtml = `<div class="weather-warning prob-danger">🌧️ 현재 비 오는 중 (우산 챙기세요)</div>`;
                } else if (blocks.length === 0) {
                    warningHtml = `<div class="weather-warning prob-safe">✅ 오늘 비 소식 없음 (우산 불필요)</div>`;
                } else {
                    let highestBlock = blocks.reduce((prev, curr) => (prev.maxProb > curr.maxProb) ? prev : curr);
                    const startStr = formatHourSimple(highestBlock.start);
                    const endStr = formatHourSimple(highestBlock.end);
                    const timeRange = startStr === endStr ? startStr : `${startStr}~${endStr}`;

                    if (highestBlock.maxProb >= 70) {
                        warningHtml = `<div class="weather-warning prob-danger">🌧️ ${timeRange} 강한 비 예상 (우산 필수!)</div>`;
                    } else {
                        warningHtml = `<div class="weather-warning prob-warn">☔ ${timeRange} 비 가능성 있음 (우산 챙기세요)</div>`;
                    }
                }

                let deleteBtnHtml = index !== null ? `<button class="delete-btn" onclick="removeLocation(${index})">✕</button>` : '';

                document.getElementById(elementId).innerHTML = `
                    ${deleteBtnHtml}
                    <div class="weather-location">📍 ${locationName}</div>
                    <div class="weather-main">
                        <span class="weather-icon">${wInfo.icon}</span>
                        <span class="weather-temp">${current.temperature_2m}°C</span>
                        <span class="weather-desc">${wInfo.text}</span>
                    </div>
                    <div class="weather-sub">
                        <span>💨 풍속: ${current.windspeed_10m} m/s</span>
                        <span>💧 습도: ${current.relativehumidity_2m}%</span>
                    </div>
                    ${warningHtml}
                `;
            } catch (e) {
                document.getElementById(elementId).innerHTML = `<div class="error-text">${locationName} 날씨 로딩 실패</div>`;
            }
        }

        function fetchGpsWeather() {
            if (!navigator.geolocation) {
                document.getElementById('gps-weather-card').innerHTML = '<div class="error-text">GPS 미지원 브라우저</div>';
                return;
            }
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                try {
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
                    const geoData = await geoRes.json();
                    const city = geoData.address.city || geoData.address.county || geoData.address.town || '현재 위치';
                    fetchWeatherData(lat, lon, city, 'gps-weather-card');
                } catch (e) {
                    fetchWeatherData(lat, lon, '현재 위치', 'gps-weather-card');
                }
            }, () => {
                document.getElementById('gps-weather-card').innerHTML = '<div class="error-text">위치 권한을 허용해주세요.</div>';
            });
        }

        function showAddFormWeather() {
            document.getElementById('btn-show-add').style.display = 'none';
            document.getElementById('add-loc-form').style.display = 'flex';
            document.getElementById('loc-input').focus();
        }

        function hideAddFormWeather() {
            document.getElementById('btn-show-add').style.display = 'flex';
            document.getElementById('add-loc-form').style.display = 'none';
            document.getElementById('loc-input').value = '';
        }

        async function addLocation() {
            const input = document.getElementById('loc-input').value.trim();
            if (!input) return;
            
            const btn = document.querySelector('#add-loc-form .btn-submit');
            btn.innerText = '검색 중...';
            btn.disabled = true;

            try {
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(input)}&format=json&limit=1`);
                const locData = await geoRes.json();
                
                if (locData && locData.length > 0) {
                    const newLoc = {
                        lat: locData[0].lat,
                        lon: locData[0].lon,
                        name: locData[0].display_name.split(',')[0]
                    };
                    savedLocations.push(newLoc);
                    localStorage.setItem('weatherLocations', JSON.stringify(savedLocations));
                    renderWeatherCards();
                } else {
                    alert('지역을 찾을 수 없습니다.');
                }
            } catch (e) {
                alert('검색 중 오류가 발생했습니다.');
            }
            hideAddFormWeather();
        }

        function removeLocation(index) {
            savedLocations.splice(index, 1);
            localStorage.setItem('weatherLocations', JSON.stringify(savedLocations));
            renderWeatherCards();
        }

        renderWeatherCards();
        setInterval(renderWeatherCards, 600000);


        // --- Section 2: Financial Dashboard Logic ---
        const formatter = new Intl.NumberFormat('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        async function fetchWithProxies(symbol) {
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`;
            try {
                const proxy1 = 'https://api.allorigins.win/get?url=';
                const res1 = await fetch(proxy1 + encodeURIComponent(targetUrl));
                if (res1.ok) {
                    const data = await res1.json();
                    if (data.contents) {
                        const json = JSON.parse(data.contents);
                        if (json.chart && json.chart.result) return json;
                    }
                }
            } catch (e) {}
            try {
                const proxy2 = 'https://corsproxy.io/?';
                const res2 = await fetch(proxy2 + targetUrl);
                if (res2.ok) {
                    const json = await res2.json();
                    if (json.chart && json.chart.result) return json;
                }
            } catch (e) {}
            throw new Error('모든 프록시 시도 실패');
        }

        async function renderStockCard(symbol, elementId, title, region) {
            try {
                const data = await fetchWithProxies(symbol);
                const meta = data.chart.result[0].meta;
                const price = meta.regularMarketPrice;
                const prevClose = meta.previousClose;
                
                const change = price - prevClose;
                const changePercent = (change / prevClose) * 100;
                
                let colorClass = 'neutral';
                let signText = '';
                let signIcon = '';

                if (change > 0) {
                    colorClass = region === 'KR' ? 'up-kr' : 'up-us';
                    signText = '+';
                    signIcon = '▲';
                } else if (change < 0) {
                    colorClass = region === 'KR' ? 'down-kr' : 'down-us';
                    signIcon = '▼';
                }

                document.getElementById(elementId).innerHTML = `
                    <h2 class="card-title">${title}</h2>
                    <div class="price ${colorClass}">${formatter.format(price)}</div>
                    <div class="change ${colorClass}">
                        ${signIcon} ${signText}${formatter.format(Math.abs(change))} (${signText}${changePercent.toFixed(2)}%)
                    </div>
                `;
            } catch (error) {
                document.getElementById(elementId).innerHTML = `
                    <h2 class="card-title">${title}</h2>
                    <div class="error-text">데이터 일시 unavailable</div>
                `;
            }
        }

        async function fetchExchangeRates() {
            try {
                const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                if (!response.ok) throw new Error();
                const data = await response.json();
                const usdKrw = data.usd.krw;
                const usdJpy = data.usd.jpy;
                const jpy100Krw = (usdKrw / usdJpy) * 100;

                document.getElementById('usd-card').innerHTML = `
                    <h2 class="card-title">달러/원 (USD/KRW)</h2>
                    <div class="price neutral">${formatter.format(usdKrw)}</div>
                `;
                document.getElementById('jpy-card').innerHTML = `
                    <h2 class="card-title">100엔/원 (JPY 100/KRW)</h2>
                    <div class="price neutral">${formatter.format(jpy100Krw)}</div>
                `;
            } catch (error) {
                document.getElementById('usd-card').innerHTML = `<h2 class="card-title">달러/원 (USD/KRW)</h2><div class="error-text">데이터 로딩 실패 - 재시도 중...</div>`;
                document.getElementById('jpy-card').innerHTML = `<h2 class="card-title">100엔/원 (JPY 100/KRW)</h2><div class="error-text">데이터 로딩 실패 - 재시도 중...</div>`;
            }
        }

        function updateDashboard() {
            renderStockCard('^KS11', 'kospi-card', '코스피 (KOSPI)', 'KR');
            renderStockCard('^KQ11', 'kosdaq-card', '코스닥 (KOSDAQ)', 'KR');
            renderStockCard('^IXIC', 'nasdaq-card', '나스닥 (NASDAQ)', 'US');
            renderStockCard('^GSPC', 'sp500-card', 'S&P 500', 'US');
            fetchExchangeRates();
            const now = new Date();
            document.getElementById('last-updated').innerText = `마지막 업데이트: ${now.toLocaleTimeString('ko-KR', { hour12: false })}`;
        }

        updateDashboard();
        setInterval(updateDashboard, 30000);

        // --- Section 3: Economic News Logic ---
        const categories = {
            kr: [
                { id: 'all', name: '전체' },
                { id: 'politics', name: '정치경제' },
                { id: 'stock', name: '증시' }
            ],
            gl: [
                { id: 'all', name: '전체' },
                { id: 'business', name: 'Business' },
                { id: 'tech', name: 'Tech' }
            ]
        };

        let currentCategory = 'kr';
        let currentSubCategory = 'all';

        function formatTimeDiff(pubDate) {
            const dateObj = typeof pubDate === 'number' ? new Date(pubDate) : new Date(pubDate);
            const diff = (Date.now() - dateObj) / 60000;
            if (isNaN(diff)) return '';
            if (diff < 60) return `${Math.floor(diff)}분 전`;
            else if (diff < 1440) return `${Math.floor(diff/60)}시간 전`;
            else return `${Math.floor(diff/1440)}일 전`;
        }

        function toggleApiSettings() {
            const form = document.getElementById('api-settings-form');
            if(form.classList.contains('hidden')) {
                const keys = JSON.parse(localStorage.getItem('apiKeys')) || { newsdata: '', gnews: '' };
                document.getElementById('api-newsdata').value = keys.newsdata || '';
                document.getElementById('api-gnews').value = keys.gnews || '';
                form.classList.remove('hidden');
            } else {
                form.classList.add('hidden');
            }
        }

        function saveApiKeys() {
            const newsdata = document.getElementById('api-newsdata').value.trim();
            const gnews = document.getElementById('api-gnews').value.trim();
            localStorage.setItem('apiKeys', JSON.stringify({ newsdata, gnews }));
            toggleApiSettings();
            loadArticles();
        }

        function setMainTab(category) {
            currentCategory = category;
            document.getElementById('main-tab-kr').classList.toggle('active', category === 'kr');
            document.getElementById('main-tab-gl').classList.toggle('active', category === 'gl');
            currentSubCategory = 'all';
            renderSubTabs();
            loadArticles();
        }

        function setSubTab(id) {
            currentSubCategory = id;
            renderSubTabs();
            loadArticles();
        }

        function renderSubTabs() {
            const container = document.getElementById('sub-tabs-container');
            let html = '';
            categories[currentCategory].forEach(cat => {
                const isActive = cat.id === currentSubCategory ? 'active' : '';
                html += `<div class="sub-tab-btn ${isActive}" onclick="setSubTab('${cat.id}')">${cat.name}</div>`;
            });
            container.innerHTML = html;
        }

        async function fetchNewsWithFallback() {
            const keys = JSON.parse(localStorage.getItem('apiKeys')) || { newsdata: '', gnews: '' };
            const isKr = currentCategory === 'kr';
            
            // Category mapping
            let catNewsdata = currentSubCategory === 'all' ? 'top' : (currentSubCategory === 'tech' ? 'technology' : 'business');
            if (currentSubCategory === 'politics') catNewsdata = 'politics';
            if (currentSubCategory === 'stock') catNewsdata = 'business';

            let catGnews = currentSubCategory === 'all' ? 'breaking-news' : (currentSubCategory === 'tech' ? 'technology' : 'business');

            // 1. NewsData.io
            if (keys.newsdata) {
                try {
                    // // TODO: NewsData.io 무료 키 입력
                    const lang = isKr ? 'ko' : 'en';
                    const countryParam = isKr ? '&country=kr' : '';
                    const url = `https://newsdata.io/api/1/news?apikey=${keys.newsdata}${countryParam}&category=${catNewsdata}&language=${lang}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    if (data.status === 'success' && data.results && data.results.length > 0) {
                        return data.results.map(item => ({
                            title: item.title,
                            link: item.link,
                            pubDate: item.pubDate,
                            source: item.source_id || 'NewsData'
                        })).slice(0, 7);
                    }
                } catch (e) { console.warn('NewsData API failed, trying fallback'); }
            }

            // 2. GNews
            if (keys.gnews) {
                try {
                    // // TODO: gnews.io 무료 키 입력
                    const lang = isKr ? 'ko' : 'en';
                    const countryParam = isKr ? '&country=kr' : '&country=us';
                    const url = `https://gnews.io/api/v4/top-headlines?topic=${catGnews}&lang=${lang}${countryParam}&max=7&apikey=${keys.gnews}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    if (data.articles && data.articles.length > 0) {
                        return data.articles.map(item => ({
                            title: item.title,
                            link: item.url,
                            pubDate: item.publishedAt,
                            source: item.source.name || 'GNews'
                        }));
                    }
                } catch (e) { console.warn('GNews API failed, trying fallback'); }
            }

            // 3. Free Fallbacks (Currents / HackerNews)
            try {
                if (isKr) {
                    const res = await fetch('https://api.currentsapi.services/v1/latest-news?language=ko&apiKey=FREE_KEY');
                    const data = await res.json();
                    if (data.news && data.news.length > 0) {
                        return data.news.map(item => ({
                            title: item.title,
                            link: item.url,
                            pubDate: item.published,
                            source: 'Currents API'
                        })).slice(0, 7);
                    } else throw new Error();
                } else {
                    const res = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
                    const ids = await res.json();
                    const top7 = ids.slice(0, 7);
                    const items = await Promise.all(top7.map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json())));
                    return items.map(item => ({
                        title: item.title,
                        link: item.url || `https://news.ycombinator.com/item?id=${item.id}`,
                        pubDate: item.time * 1000,
                        source: 'HackerNews'
                    }));
                }
            } catch (e) {
                throw new Error('All fallbacks failed');
            }
        }

        async function loadArticles() {
            const container = document.getElementById('article-list');
            container.innerHTML = '<div style="padding:20px; color:var(--text-sub);">기사를 불러오는 중...</div>';
            
            try {
                const articles = await fetchNewsWithFallback();
                if (!articles || articles.length === 0) throw new Error();

                let html = '';
                articles.forEach((item, index) => {
                    html += `
                        <a href="${item.link}" target="_blank" class="article-card">
                            <div class="article-num">${index + 1}</div>
                            <div class="article-content">
                                <div class="article-title">${item.title}</div>
                                <div class="article-meta">${formatTimeDiff(item.pubDate)}</div>
                            </div>
                        </a>
                    `;
                });
                container.innerHTML = html;
                document.getElementById('news-updated').innerText = `마지막 갱신: ${new Date().toLocaleTimeString('ko-KR', { hour12: false })}`;
            } catch (e) {
                container.innerHTML = '<div style="padding:20px; color:var(--color-error);">기사를 불러올 수 없습니다. API 키를 설정하거나 나중에 다시 시도해주세요.</div>';
            }
        }

        // Initialize News Section
        window.addEventListener('DOMContentLoaded', () => {
            renderSubTabs();
            loadArticles();
            setInterval(loadArticles, 1800000); // 30분 갱신
        });

    </script>
</body>
</html>

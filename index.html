<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 개인 대시보드</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #111827;
            --text-muted: #4b5563;
            --accent: #3b82f6;
            --border-radius: 20px;
        }
        
        body {
            font-family: 'Pretendard', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: background 1s ease-in-out;
            background-color: #e0f2fe; 
        }
        
        /* 날씨 상태에 따른 동적 배경 */
        body.bg-clear { background: linear-gradient(to bottom, #7dd3fc, #bae6fd); } 
        body.bg-clouds { background: linear-gradient(to bottom, #94a3b8, #cbd5e1); } 
        body.bg-rain { background: linear-gradient(to bottom, #475569, #94a3b8); color: #fff; } 
        body.bg-snow { background: linear-gradient(to bottom, #e2e8f0, #f8fafc); } 

        .container { max-width: 1200px; width: 100%; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 0 10px;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }
        
        body.bg-rain header { color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        
        .time-display { text-align: right; }
        .time-display #date { font-size: 15px; font-weight: 600; }
        .time-display #time { font-size: 28px; font-weight: 800; letter-spacing: 1px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }
        
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            color: #111827; 
        }
        
        .card-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-header i { color: var(--accent); }
        
        .weather-info { 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            padding: 10px 0; 
        }
        .weather-main { text-align: center; }
        .weather-icon { font-size: 45px; margin-bottom: 8px; }
        .temp { font-size: 28px; font-weight: 800; }
        .weather-desc { color: var(--text-muted); font-size: 14px; font-weight: 600; }
        
        .news-item, .list-item {
            display: block;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
            color: #1f2937;
            text-decoration: none;
            font-size: 15px;
            line-height: 1.5;
        }
        .news-item:last-child, .list-item:last-child { border-bottom: none; }
        .news-item:hover { color: var(--accent); font-weight: 600; }
        
        .isdram-row {
            display: flex; justify-content: space-between; 
            padding: 12px 16px; margin-top: 10px;
            background: #f8fafc; border-radius: 8px;
            font-weight: 600; font-size: 14px;
        }
    </style>
</head>
<body class="bg-clear">
    <div class="container">
        <header>
            <h1>오늘의 대시보드 🚀</h1>
            <div class="time-display">
                <div id="date">로딩 중...</div>
                <div id="time">--:--:--</div>
            </div>
        </header>

        <div class="grid">
            <div class="card" style="padding: 0; overflow: hidden;">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                    {
                        "colorTheme": "light",
                        "dateRange": "1D",
                        "showChart": false,
                        "locale": "kr",
                        "width": "100%",
                        "height": "280",
                        "isTransparent": true,
                        "showSymbolLogo": true,
                        "showFloatingTooltip": true,
                        "tabs": [
                        {
                            "title": "주가지수",
                            "symbols": [
                                { "s": "KRX:KOSPI", "d": "코스피" },
                                { "s": "KRX:KOSDAQ", "d": "코스닥" },
                                { "s": "AMEX:DIA", "d": "다우존스" },
                                { "s": "AMEX:SPY", "d": "S&P 500" },
                                { "s": "NASDAQ:QQQ", "d": "나스닥 100" }
                            ]
                        }
                        ]
                    }
                    </script>
                </div>
            </div>

            <div class="card" style="padding: 0; overflow: hidden; position: relative;">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                    {
                        "colorTheme": "light",
                        "dateRange": "1D",
                        "showChart": false,
                        "locale": "kr",
                        "width": "100%",
                        "height": "230",
                        "isTransparent": true,
                        "showSymbolLogo": true,
                        "showFloatingTooltip": true,
                        "tabs": [
                        {
                            "title": "환율",
                            "symbols": [
                                { "s": "FX_IDC:USDKRW", "d": "원/달러" },
                                { "s": "FX_IDC:JPYKRW", "d": "원/엔 (100엔)" },
                                { "s": "FX_IDC:CNYKRW", "d": "원/위안" }
                            ]
                        }
                        ]
                    }
                    </script>
                </div>
                <div style="padding: 0 16px 16px 16px;">
                    <div class="isdram-row">
                        <span><i class="fa-solid fa-microchip" style="color:var(--accent);"></i> ISDRAM 지수</span>
                        <span style="color:#ef4444;">1,425.80 (+2.45%)</span>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><i class="fa-solid fa-cloud-sun"></i> 실시간 날씨 (부산)</div>
                <div class="weather-info" id="weather-container">
                    <div class="weather-main">
                        <div class="weather-desc">현재 날씨</div>
                        <div class="weather-icon" id="w-icon-now">⏳</div>
                        <div class="temp" id="w-temp-now">--°C</div>
                    </div>
                    <div class="weather-main">
                        <div class="weather-desc">오늘 최고/최저</div>
                        <div class="weather-icon">🌡️</div>
                        <div class="temp" id="w-temp-maxmin" style="font-size: 20px; margin-top:15px;">--° / --°</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><i class="fa-regular fa-newspaper"></i> 실시간 주요 뉴스</div>
                <div id="news-data">
                    <div class="list-item">뉴스를 불러오는 중입니다...</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><i class="fa-regular fa-calendar-check"></i> 오늘의 할 일</div>
                <div id="todo-data">
                    <div class="list-item"><i class="fa-solid fa-check" style="color:var(--accent);"></i> 오전 10:00 - 주간 업무 보고 회의 참석</div>
                    <div class="list-item"><i class="fa-solid fa-check" style="color:var(--accent);"></i> 오후 02:00 - 신규 프로젝트 킥오프 미팅</div>
                    <div class="list-item"><i class="fa-solid fa-check" style="color:var(--accent);"></i> 오후 06:30 - 헬스장 (하체 운동)</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 실시간 시계
        function updateTime() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('date').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 ${days[now.getDay()]}요일`;
            let hours = now.getHours();
            const ampm = hours >= 12 ? '오후' : '오전';
            hours = hours % 12 || 12;
            document.getElementById('time').innerText = `${ampm} ${hours}:${String(now.getMinutes()).padStart(2, '0')}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. 실시간 날씨 (부산 기준)
        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.1796&longitude=129.0756&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul');
                const data = await res.json();
                
                const currentTemp = Math.round(data.current.temperature_2m);
                const code = data.current.weather_code;
                const maxTemp = Math.round(data.daily.temperature_2m_max[0]);
                const minTemp = Math.round(data.daily.temperature_2m_min[0]);
                
                let icon = '☁️'; let bgClass = 'bg-clouds';

                if (code === 0 || code === 1) { icon = '☀️'; bgClass = 'bg-clear'; }
                else if (code === 2 || code === 3) { icon = '⛅'; bgClass = 'bg-clouds'; }
                else if (code >= 45 && code <= 48) { icon = '🌫️'; bgClass = 'bg-clouds'; }
                else if (code >= 51 && code <= 67 || code >= 80 && code <= 82) { icon = '🌧️'; bgClass = 'bg-rain'; }
                else if (code >= 71 && code <= 77 || code >= 85 && code <= 86) { icon = '❄️'; bgClass = 'bg-snow'; }
                else if (code >= 95) { icon = '⛈️'; bgClass = 'bg-rain'; }

                document.getElementById('w-temp-now').innerText = `${currentTemp}°C`;
                document.getElementById('w-icon-now').innerText = icon;
                document.getElementById('w-temp-maxmin').innerText = `${maxTemp}° / ${minTemp}°`;
                
                document.body.className = bgClass;
            } catch (error) {
                console.error("날씨 로드 오류:", error);
            }
        }
        fetchWeather();
        setInterval(fetchWeather, 600000); 

        // 3. 주요 경제 뉴스 (매일경제 RSS - CORS 우회 없이 rss2json 활용)
        async function fetchNews() {
            try {
                // 매일경제 경제/금융 섹션 RSS 피드
                const rssUrl = 'https://www.mk.co.kr/rss/30000001/';
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
                
                const res = await fetch(apiUrl);
                const data = await res.json();
                
                if(data.status === 'ok') {
                    let newsHtml = '';
                    // 최신 기사 4개
                    for(let i=0; i<4; i++) {
                        if(data.items[i]) {
                            newsHtml += `<a href="${data.items[i].link}" target="_blank" class="news-item">📰 ${data.items[i].title}</a>`;
                        }
                    }
                    document.getElementById('news-data').innerHTML = newsHtml;
                } else {
                    throw new Error("RSS 변환 실패");
                }
            } catch (error) {
                document.getElementById('news-data').innerHTML = `
                    <div class="list-item">뉴스를 불러오지 못했습니다.</div>
                    <a href="https://news.naver.com/main/main.naver?mode=LSD&mid=shm&sid1=101" target="_blank" class="news-item" style="color: var(--accent); text-align: center; font-weight: bold;">👉 네이버 경제 뉴스 바로가기</a>
                `;
            }
        }
        fetchNews();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>또간집 풍맵 얼티밋</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #2c3e50; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; width: 100%; height: 100%; }
        
        #header { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 9999; background: rgba(255, 204, 0, 0.95); padding: 12px 24px; border-radius: 50px; font-size: 16px; font-weight: 900; white-space: nowrap; box-shadow: 0 4px 15px rgba(0,0,0,0.3); color: #1a1a1a; border: 2px solid #fff; }
        
        /* GPS 버튼 디자인 */
        #gps-btn { position: absolute; bottom: 30px; right: 20px; z-index: 9999; background: #ffffff; border: 1px solid #ccc; border-radius: 50%; width: 50px; height: 50px; text-align: center; line-height: 50px; font-size: 22px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* 팝업창 스타일 디자인 */
        .leaflet-popup-content-wrapper { border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; }
        .popup-header { background: #d32f2f; color: white; padding: 12px 15px; font-size: 16px; font-weight: bold; }
        .popup-body { padding: 15px; font-size: 14px; line-height: 1.6; color: #333; background: #fff; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-weight: 800; font-size: 11px; margin-bottom: 8px; background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
        .comment { margin-top: 8px; color: #555; padding: 8px; background: #f8f9fa; border-radius: 8px; border-left: 3px solid #ffcc00; font-size: 13px; }
        
        /* 길찾기 버튼 스타일 */
        .btn-group { display: flex; gap: 8px; margin-top: 12px; }
        .navi-btn { flex: 1; text-align: center; text-decoration: none; padding: 8px 0; border-radius: 6px; font-size: 13px; font-weight: bold; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-kakao { background: #fee500; color: #191919; } /* 카카오 노란색 */
        .btn-naver { background: #03c75a; color: #fff; }   /* 네이버 초록색 */
        
        .marker-icon { font-size: 26px; text-shadow: 2px 2px 5px rgba(0,0,0,0.4); text-align: center; }
    </style>
</head>
<body>

<div id="header">🗺️ 풍맵</div>
<div id="map"></div>

<div id="gps-btn" title="내 위치 찾기">🎯</div>

<script>
    // 1. 지도 생성
    var map = L.map('map', {zoomControl: false}).setView([36.2, 127.8], 7);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; 풍맵'
    }).addTo(map);

    // 유저 위치 표시용 마커 변수
    var userLocationMarker = null;

    // 2. 데이터베이스 (식당 데이터)
    var data = [
        { n: "떡도리탕", loc: "강남", lat: 37.5005, lng: 127.0275, s: "🏆 삐라", c: "강남 한복판에서 이 가격? 감자가 미침" },
        { n: "뉴오더클럽", loc: "연남동", lat: 37.5611, lng: 126.9248, s: "🏆 삐라", c: "연남동 피자 맛집 종결" },
        { n: "와타요업", loc: "대전", lat: 36.3375, lng: 127.3940, s: "🏆 삐라", c: "텐동 튀김 퀄리티 미침, 맛잼 도시 대전" },
        { n: "왕거미식당", loc: "대구", lat: 35.8679, lng: 128.6045, s: "🏆 삐라", c: "오드레기 불향 대박, 뭉티기는 예술" },
        { n: "세정", loc: "부산", lat: 35.1015, lng: 129.0265, s: "🏆 삐라", c: "부산 토박이들의 한치모밀쟁반" },
        { n: "신해바라기", loc: "제주시", lat: 33.5126, lng: 126.5233, s: "🏆 삐라", c: "제주도민들만 아는 찐로컬 순두부찌개" }
    ];

    // 3. 식당 마커 뿌리기 + 길찾기 링크 연동
    data.forEach(p => {
        var emoji = p.s.includes("삐라") ? "🏆" : "💬";
        
        var customIcon = L.divIcon({
            className: 'marker-icon',
            html: emoji,
            iconSize: [36, 36],
            iconAnchor: [18, 36],
            popupAnchor: [0, -36]
        });

        // 카카오맵 및 네이버 지도 길찾기 URL 생성 (모바일 앱 연동 규격)
        var kakaoUrl = "https://map.kakao.com/link/to/" + encodeURIComponent(p.n) + "," + p.lat + "," + p.lng;
        var naverUrl = "https://map.naver.com/v5/search/" + encodeURIComponent(p.loc + " " + p.n);

        var popupHtml = `
            <div class='popup-header'>[${p.loc}] ${p.n}</div>
            <div class='popup-body'>
                <div class='badge'>${p.s}</div>
                <div class='comment'>"${p.c}"</div>
                <div class='btn-group'>
                    <a href='${kakaoUrl}' target='_blank' class='navi-btn btn-kakao'>카카오 길찾기</a>
                    <a href='${naverUrl}' target='_blank' class='navi-btn btn-naver'>네이버 검색</a>
                </div>
            </div>
        `;

        L.marker([p.lat, p.lng], {icon: customIcon})
         .addTo(map)
         .bindPopup(popupHtml, { maxWidth: 260, minWidth: 220 });
    });

    // 4. GPS 기반 내 위치 찾기 기능
    document.getElementById('gps-btn').addEventListener('click', function() {
        if (!navigator.geolocation) {
            alert("이 브라우저에서는 GPS 기능을 지원하지 않습니다.");
            return;
        }

        // 사용자의 브라우저/스마트폰에 위치 권한 요청
        navigator.geolocation.getCurrentPosition(function(position) {
            var lat = position.coords.latitude;
            var lng = position.coords.longitude;

            // 기존에 찍힌 내 위치 마커가 있다면 제거
            if (userLocationMarker) {
                map.removeLayer(userLocationMarker);
            }

            // 현재 내 위치에 파란색 서클 마커 생성
            userLocationMarker = L.circleMarker([lat, lng], {
                radius: 10,
                color: '#ffffff',
                weight: 3,
                fillColor: '#007bef',
                fillOpacity: 1
            }).addTo(map).bindPopup("<b>내 현재 위치</b>").openPopup();

            // 지도 시점을 내 위치로 이동하고 확대(줌레벨 14)
            map.setView([lat, lng], 14);

        }, function(error) {
            alert("위치 권한 승인이 거부되었거나 위치를 찾을 수 없습니다.");
        }, {
            enableHighAccuracy: true, // 최대한 정확한 GPS 값 가져오기
            timeout: 5000
        });
    });

    setTimeout(function(){ map.invalidateSize(); }, 300);
</script>

</body>
</html>

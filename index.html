<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 글로벌 금융 & 환경 대시보드</title>
    <style>
        :root {
            --bg-main: #1a1a2e;
            --bg-card: #16213e;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --color-up-kr: #ff3333;
            --color-down-kr: #3377ff;
            --color-up-us: #10b981;
            --color-down-us: #ef4444;
            --color-error: #f59e0b;
            --border-color: #2a2a4a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* --- Section 1: Time & Weather --- */
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .time-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .clock {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .date {
            font-size: 1.2rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        .weather-container {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 250px;
        }

        .weather-location {
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: 600;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .weather-icon {
            font-size: 2.5rem;
        }

        .weather-temp {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .weather-desc {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .weather-sub {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .separator {
            width: 100%;
            height: 1px;
            background-color: var(--border-color);
            border: none;
            margin: 0;
        }

        /* --- Section 2: Financial Dashboard --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: -10px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .update-time {
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-title {
            font-size: 1rem;
            color: var(--text-sub);
            margin: 0;
            font-weight: 600;
        }

        .price {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0;
        }

        .change {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .up-kr { color: var(--color-up-kr); }
        .down-kr { color: var(--color-down-kr); }
        .up-us { color: var(--color-up-us); }
        .down-us { color: var(--color-down-us); }
        .neutral { color: var(--text-main); }

        .error-text {
            color: var(--color-error);
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 10px;
        }
        
        .loading {
            color: var(--text-sub);
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            .top-section {
                flex-direction: column;
                align-items: flex-start;
            }
            .weather-container {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="top-section">
            <div class="time-container">
                <div id="clock" class="clock">--:--:--</div>
                <div id="date" class="date">----년 --월 --일 (-)</div>
            </div>
            <div class="weather-container" id="weather-box">
                <div class="loading">위치 및 날씨 정보 확인 중...</div>
            </div>
        </div>

        <hr class="separator">

        <div class="header">
            <h1>Global Market Dashboard</h1>
            <div class="update-time" id="last-updated">마지막 업데이트: --:--:--</div>
        </div>

        <div class="grid-container">
            <div class="card" id="kospi-card">
                <h2 class="card-title">코스피 (KOSPI)</h2>
                <div class="loading">데이터 로딩 중...</div>
            </div>
            <div class="card" id="kosdaq-card">
                <h2 class="card-title">코스닥 (KOSDAQ)</h2>
                <div class="loading">데이터 로딩 중...</div>
            </div>
            <div class="card" id="nasdaq-card">
                <h2 class="card-title">나스닥 (NASDAQ)</h2>
                <div class="loading">데이터 로딩 중...</div>
            </div>
            <div class="card" id="sp500-card">
                <h2 class="card-title">S&P 500</h2>
                <div class="loading">데이터 로딩 중...</div>
            </div>
            <div class="card" id="usd-card">
                <h2 class="card-title">달러/원 (USD/KRW)</h2>
                <div class="loading">데이터 로딩 중...</div>
            </div>
            <div class="card" id="jpy-card">
                <h2 class="card-title">100엔/원 (JPY 100/KRW)</h2>
                <div class="loading">데이터 로딩 중...</div>
            </div>
        </div>
    </div>

    <script>
        // --- Section 1: Time & Weather Logic ---
        function updateClock() {
            const now = new Date();
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
            document.getElementById('date').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function parseWeatherCode(code) {
            if (code === 0) return { icon: '☀️', text: '맑음' };
            if ([1, 2, 3].includes(code)) return { icon: '🌤️', text: '구름 조금' };
            if ([45, 48].includes(code)) return { icon: '🌫️', text: '안개' };
            if ([51, 53, 55].includes(code)) return { icon: '🌦️', text: '이슬비' };
            if ([61, 63, 65].includes(code)) return { icon: '🌧️', text: '비' };
            if ([71, 73, 75].includes(code)) return { icon: '❄️', text: '눈' };
            if ([80, 81, 82].includes(code)) return { icon: '🌧️', text: '소나기' };
            if (code === 95) return { icon: '⛈️', text: '뇌우' };
            return { icon: '🌡️', text: '기타' };
        }

        async function fetchWeather() {
            if (!navigator.geolocation) {
                document.getElementById('weather-box').innerHTML = '<div class="error-text">GPS를 지원하지 않는 브라우저입니다.</div>';
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                try {
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
                    const geoData = await geoRes.json();
                    const city = geoData.address.city || geoData.address.county || geoData.address.town || geoData.address.borough || '알 수 없는 위치';

                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&timezone=auto`);
                    const weatherData = await weatherRes.json();
                    const current = weatherData.current;
                    const wInfo = parseWeatherCode(current.weathercode);

                    document.getElementById('weather-box').innerHTML = `
                        <div class="weather-location">📍 ${city}</div>
                        <div class="weather-main">
                            <span class="weather-icon">${wInfo.icon}</span>
                            <span class="weather-temp">${current.temperature_2m}°C</span>
                            <span class="weather-desc">${wInfo.text}</span>
                        </div>
                        <div class="weather-sub">
                            <span>💨 풍속: ${current.windspeed_10m} m/s</span>
                            <span>💧 습도: ${current.relativehumidity_2m}%</span>
                        </div>
                    `;
                } catch (e) {
                    document.getElementById('weather-box').innerHTML = '<div class="error-text">날씨 데이터를 불러오지 못했습니다.</div>';
                }
            }, (err) => {
                document.getElementById('weather-box').innerHTML = '<div class="error-text">위치 권한을 허용해주세요.</div>';
            });
        }
        
        fetchWeather();
        setInterval(fetchWeather, 600000); // 10분마다 갱신


        // --- Section 2: Financial Dashboard Logic ---
        const formatter = new Intl.NumberFormat('ko-KR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        async function fetchWithProxies(symbol) {
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}`;
            
            try {
                const proxy1 = 'https://api.allorigins.win/get?url=';
                const res1 = await fetch(proxy1 + encodeURIComponent(targetUrl));
                if (res1.ok) {
                    const data = await res1.json();
                    if (data.contents) {
                        const json = JSON.parse(data.contents);
                        if (json.chart && json.chart.result) return json;
                    }
                }
            } catch (e) {}

            try {
                const proxy2 = 'https://corsproxy.io/?';
                const res2 = await fetch(proxy2 + targetUrl);
                if (res2.ok) {
                    const json = await res2.json();
                    if (json.chart && json.chart.result) return json;
                }
            } catch (e) {}

            throw new Error('모든 프록시 시도 실패');
        }

        async function renderStockCard(symbol, elementId, title, region) {
            try {
                const data = await fetchWithProxies(symbol);
                const meta = data.chart.result[0].meta;
                const price = meta.regularMarketPrice;
                const prevClose = meta.previousClose;
                
                const change = price - prevClose;
                const changePercent = (change / prevClose) * 100;
                
                let colorClass = 'neutral';
                let signText = '';
                let signIcon = '';

                if (change > 0) {
                    colorClass = region === 'KR' ? 'up-kr' : 'up-us';
                    signText = '+';
                    signIcon = '▲';
                } else if (change < 0) {
                    colorClass = region === 'KR' ? 'down-kr' : 'down-us';
                    signIcon = '▼';
                }

                document.getElementById(elementId).innerHTML = `
                    <h2 class="card-title">${title}</h2>
                    <div class="price ${colorClass}">${formatter.format(price)}</div>
                    <div class="change ${colorClass}">
                        ${signIcon} ${signText}${formatter.format(Math.abs(change))} (${signText}${changePercent.toFixed(2)}%)
                    </div>
                `;
            } catch (error) {
                document.getElementById(elementId).innerHTML = `
                    <h2 class="card-title">${title}</h2>
                    <div class="error-text">데이터 일시 unavailable</div>
                `;
            }
        }

        async function fetchExchangeRates() {
            try {
                const response = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                
                if (!response.ok) throw new Error();
                
                const data = await response.json();
                const usdKrw = data.usd.krw;
                const usdJpy = data.usd.jpy;
                const jpy100Krw = (usdKrw / usdJpy) * 100;

                document.getElementById('usd-card').innerHTML = `
                    <h2 class="card-title">달러/원 (USD/KRW)</h2>
                    <div class="price neutral">${formatter.format(usdKrw)}</div>
                `;
                
                document.getElementById('jpy-card').innerHTML = `
                    <h2 class="card-title">100엔/원 (JPY 100/KRW)</h2>
                    <div class="price neutral">${formatter.format(jpy100Krw)}</div>
                `;
            } catch (error) {
                document.getElementById('usd-card').innerHTML = `
                    <h2 class="card-title">달러/원 (USD/KRW)</h2>
                    <div class="error-text">데이터 로딩 실패 - 재시도 중...</div>
                `;
                document.getElementById('jpy-card').innerHTML = `
                    <h2 class="card-title">100엔/원 (JPY 100/KRW)</h2>
                    <div class="error-text">데이터 로딩 실패 - 재시도 중...</div>
                `;
            }
        }

        function updateDashboard() {
            renderStockCard('^KS11', 'kospi-card', '코스피 (KOSPI)', 'KR');
            renderStockCard('^KQ11', 'kosdaq-card', '코스닥 (KOSDAQ)', 'KR');
            renderStockCard('^IXIC', 'nasdaq-card', '나스닥 (NASDAQ)', 'US');
            renderStockCard('^GSPC', 'sp500-card', 'S&P 500', 'US');
            
            fetchExchangeRates();
            
            const now = new Date();
            const timeString = now.toLocaleTimeString('ko-KR', { hour12: false });
            document.getElementById('last-updated').innerText = `마지막 업데이트: ${timeString}`;
        }

        updateDashboard();
        setInterval(updateDashboard, 30000);
    </script>
</body>
</html>
